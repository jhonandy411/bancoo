  <script>
    (function () {
      const docPath = '/supracategorias/Cardiología y cirugía cardiovascular/categorias/Taquicardias/subcategorias/Taquicardia supraventricular';
      const container = document.getElementById('dynamic-content-loader');

      // Track loaded sections to avoid reloading
      const loadedSections = new Set();
      let articleData = null;

      // Ensure Firebase is initialized (it should be from portal1.html)
      if (typeof db !== 'undefined') {
        console.log('Fetching content from:', docPath);
        db.doc(docPath).get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            articleData = data;

            // Check content type
            if (data.contentType === 'sectioned' && data.sections) {
              // New sectioned format - render with lazy loading
              renderSectionedContent(data);
            } else if (data.html_completo) {
              // Legacy monolithic format
              container.innerHTML = data.html_completo;
            } else {
              container.innerHTML = '<p style="color:red">Document found, but no valid content.</p>';
            }
          } else {
            container.innerHTML = '<p style="color:red">Content not found in Firestore.</p>';
          }
        }).catch(error => {
          console.error('Error loading dynamic content:', error);
          container.innerHTML = '<p style="color:red">Error loading content: ' + error.message + '</p>';
        });
      } else {
        container.innerHTML = '<p style="color:red">Firebase not initialized.</p>';
      }

      function renderSectionedContent(data) {
        const { sections, sectionOrder } = data;

        // Create article wrapper
        const article = document.createElement('article');

        // Render each section with collapsed content initially
        sectionOrder.forEach(sectionId => {
          const sectionData = sections[sectionId];
          if (!sectionData) return;

          const sectionElement = createSectionElement(sectionId, sectionData.title);
          article.appendChild(sectionElement);
        });

        container.innerHTML = '';
        container.appendChild(article);

        // Attach click handlers for lazy loading
        attachSectionHandlers();
      }

      function createSectionElement(sectionId, title) {
        const section = document.createElement('div');
        section.innerHTML = `
          <section class="a19c2cb9aca4d5ec--container" id="${sectionId}" data-section-id="${sectionId}">
            <div class="cebd2a302a3552c4--headerContainer" role="button" data-section-header="${sectionId}">
                <div class="d7af962a6244a4b8--container">
                    <div class="d7af962a6244a4b8--title">
                        <div class="css-13j1u6m-InlineContainer e6i75dx0">
                            <div class="css-h0nko7-StyledInlineItem e6i75dx1"></div>
                            <div class="css-h0nko7-StyledInlineItem e6i75dx1"></div>
                            <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                                <h3 class="d7af962a6244a4b8--expanded">${title}</h3>
                                <div class="d7af962a6244a4b8--reference"></div>
                            </div>
                            <div class="css-h0nko7-StyledInlineItem e6i75dx1"></div>
                        </div>
                        <div class="css-qh8u1a-StyledBox ebcgi2u0">
                            <div class="d7af962a6244a4b8--bookmarkButton"><span><button type="button"
                                        aria-label="Save to collection" name="save_button"
                                        class="css-f83uhv-StyledPictogramButton ej9y1j50">
                                        <div class="css-mgid52-InlineContainer e6i75dx0">
                                            <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                                                <div color="inherit" class="css-cjtild-StyledIcon e1kkd7uc0"><svg
                                                        xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                                                        viewBox="0 0 16 16">
                                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2"
                                                            d="m13 14-5-3.333L3 14V3.333C3 2.597 3.64 2 4.429 2h7.142C12.361 2 13 2.597 13 3.333z"
                                                            clip-rule="evenodd"></path>
                                                    </svg></div>
                                            </div>
                                        </div>
                                    </button></span></div>
                        </div>
                    </div>
                    <div></div>
                </div>
                <div color="quaternary" class="css-2vq6ya-StyledIcon e1kkd7uc0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2" viewBox="0 0 24 24">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </div>
            </div>
            <div class="cebd2a302a3552c4--contentContainer" data-section-content="${sectionId}" style="display: none;">
              <div class="a19c2cb9aca4d5ec--baseStyles a19c2cb9aca4d5ec--disableImagePointerEventOnTutorial a19c2cb9aca4d5ec--anchorLinkStyles a19c2cb9aca4d5ec--content _843a18d838954f85--userHighlightsActiveOnArticle">
                <p style="color: #999; font-style: italic;">Loading section...</p>
              </div>
              <div class="css-10tzyyx-StyledBox ebcgi2u0">
                <div class="css-1ox6j4a-StyledBox ebcgi2u0">
                    <div class="css-1isf9yl-InlineContainer e6i75dx0">
                        <div class="css-h0nko7-StyledInlineItem e6i75dx1"><button type="button"
                                class="css-e9wdc6-StyledButton ejph2fy0">
                                <div class="css-c3523d-StyledInner ejph2fy1">
                                    <div class="css-mgid52-InlineContainer e6i75dx0">
                                        <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                                            <div color="inherit" class="css-cjtild-StyledIcon e1kkd7uc0"><svg
                                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                                                    viewBox="0 0 16 16">
                                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel"
                                                        stroke-width="2" d="M3 6h10M3 10h10"></path>
                                                    <path fill="currentColor" d="m8 12 3 3H5zm0-8L5 1h6z"></path>
                                                </svg></div>
                                        </div>
                                        <div class="css-h0nko7-StyledInlineItem e6i75dx1">Collapse</div>
                                    </div>
                                </div>
                            </button></div>
                        <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                            <div class="css-17dkjqr-InlineContainer e6i75dx0">
                                <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                                    <div class="css-1yxslas-InlineContainer e6i75dx0">
                                        <div class="css-h0nko7-StyledInlineItem e6i75dx1"><button type="button"
                                                class="css-e9wdc6-StyledButton ejph2fy0">
                                                <div class="css-c3523d-StyledInner ejph2fy1">
                                                    <div class="css-mgid52-InlineContainer e6i75dx0">
                                                        <div class="css-h0nko7-StyledInlineItem e6i75dx1">
                                                            <div color="inherit" class="css-cjtild-StyledIcon e1kkd7uc0"><svg
                                                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                                                    fill="none" viewBox="0 0 16 16">
                                                                    <path stroke="currentColor" stroke-linecap="round"
                                                                        stroke-linejoin="round" stroke-width="2"
                                                                        d="M9 14h6M10.45 3.438a1.494 1.494 0 1 1 2.113 2.112l-7.746 7.746L2 14l.704-2.817z">
                                                                    </path>
                                                                </svg></div>
                                                        </div>
                                                        <div class="css-h0nko7-StyledInlineItem e6i75dx1">Notes</div>
                                                    </div>
                                                </div>
                                            </button></div>
                                    </div>
                                </div>
                                <div class="css-h0nko7-StyledInlineItem e6i75dx1"><button type="button"
                                        class="css-e9wdc6-StyledButton ejph2fy0">
                                        <div class="css-c3523d-StyledInner ejph2fy1">
                                            <div class="css-mgid52-InlineContainer e6i75dx0">
                                                <div class="css-h0nko7-StyledInlineItem e6i75dx1">Feedback</div>
                                            </div>
                                        </div>
                                    </button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
          </section>
        `;
        return section.firstElementChild;
      }

      function attachSectionHandlers() {
        document.querySelectorAll('[data-section-header]').forEach(header => {
          header.addEventListener('click', function (e) {
            // Prevent toggling if clicking the bookmark button
            if (e.target.closest('button[name="save_button"]')) {
              e.stopPropagation();
              return;
            }
            const sectionId = this.dataset.sectionHeader;
            toggleSection(sectionId);
          });
        });
      }

      function toggleSection(sectionId) {
        const contentContainer = document.querySelector(`[data-section-content="${sectionId}"]`);
        const headerContainer = document.querySelector(`[data-section-header="${sectionId}"]`);

        if (!contentContainer) return;

        const isExpanded = contentContainer.style.display !== 'none';
        const iconPath = headerContainer.querySelector('.css-2vq6ya-StyledIcon svg path');

        if (isExpanded) {
          // Collapse section
          contentContainer.style.display = 'none';
          headerContainer.classList.remove('cebd2a302a3552c4--headerContainerActive');
          contentContainer.classList.remove('cebd2a302a3552c4--contentContainerActive');
          // Set icon to point down
          if (iconPath) iconPath.setAttribute('d', 'm6 9 6 6 6-6');
        } else {
          // Expand section
          contentContainer.style.display = 'block';
          headerContainer.classList.add('cebd2a302a3552c4--headerContainerActive');
          contentContainer.classList.add('cebd2a302a3552c4--contentContainerActive');
          // Set icon to point up
          if (iconPath) iconPath.setAttribute('d', 'm18 15-6-6-6 6');

          // Load content if not already loaded
          if (!loadedSections.has(sectionId)) {
            loadSectionContent(sectionId, contentContainer);
          }
        }
      }

      function loadSectionContent(sectionId, contentContainer) {
        if (!articleData || !articleData.sections || !articleData.sections[sectionId]) {
          contentContainer.querySelector('.a19c2cb9aca4d5ec--baseStyles').innerHTML =
            '<p style="color:red">Section content not found.</p>';
          return;
        }

        const sectionHTML = articleData.sections[sectionId].html;
        contentContainer.querySelector('.a19c2cb9aca4d5ec--baseStyles').innerHTML = sectionHTML;
        loadedSections.add(sectionId);

        console.log(`✅ Loaded section: ${sectionId}`);
      }
    })();
  </script>
