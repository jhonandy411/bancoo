  <script>


    // Cargar contenido en el panel principal desde un HTML externo
    function loadMainContent(url) {
      var main = document.getElementById('main-content');
      if (!main) return;

      fetch(url)
        .then(function (response) {
          if (!response.ok) throw new Error('Error cargando ' + url);
          return response.text();
        })
        .then(function (html) {
          main.innerHTML = html;

          // Ejecutar scripts que vengan en el HTML inyectado
          var scripts = main.querySelectorAll('script');
          scripts.forEach(function (oldScript) {
            var newScript = document.createElement('script');
            // Copiar atributos (src, type, etc.)
            Array.from(oldScript.attributes).forEach(function (attr) {
              newScript.setAttribute(attr.name, attr.value);
            });
            // Copiar contenido inline
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            // Reemplazar el script viejo por el nuevo para que el navegador lo ejecute
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
        })
        .catch(function (err) {
          console.error('No se pudo cargar el contenido:', err);
        });
    }

    // Expuesta para que articles.html pueda abrir
    // la vista de contenido de subcategoría al hacer
    // clic en un ítem del tercer panel.
    window.showSubcatFromArticles = function (subcat) {
      console.log('Loading content for subcat:', subcat);
      const mainContent = document.getElementById('main-content');
      if (!mainContent) return;

      // Show loading state
      mainContent.innerHTML = '<div style="padding: 20px; text-align: center;">Loading content...</div>';

      // 1. Check if content is already merged in the subcategory object
      if (subcat.html_completo) {
        console.log('Content found directly in subcategory object.');
        mainContent.innerHTML = subcat.html_completo;
        return;
      }

      // 2. Fallback: Try to fetch from 'articulos_contenido' (legacy/alternative method)
      if (subcat.id) {
        db.collection('articulos_contenido').doc(subcat.id).get()
          .then((doc) => {
            if (doc.exists) {
              const data = doc.data();
              mainContent.innerHTML = data.html_completo || '<p>No content available.</p>';
            } else {
              console.warn('Content not found in merged object or separate collection. ID:', subcat.id);
              // 3. Last resort: Static file
              loadMainContent('subcategoriacontent.html');
            }
          })
          .catch((error) => {
            console.error('Error getting content document:', error);
            mainContent.innerHTML = '<p>Error loading content. Please try again.</p>';
          });
      } else {
        loadMainContent('subcategoriacontent.html');
      }
    };

    // Utilidad genérica para colapsar/expandir elementos padre que tienen hijos
    function initCollapsibleSidebar(options) {
      var containers = document.querySelectorAll(options.containerSelector);

      containers.forEach(function (container) {
        var headerBtn = container.querySelector(options.headerSelector);
        var submenuWrapper = container.querySelector(options.submenuSelector);

        // Si el elemento no tiene hijos (submenu), no hacemos nada
        if (!headerBtn || !submenuWrapper) return;

        // Estado inicial: colapsado si no se definió antes
        if (!container.hasAttribute('data-collapsed')) {
          container.setAttribute('data-collapsed', 'true');
        }

        // Toggle genérico reutilizable
        headerBtn.addEventListener('click', function () {
          var isCollapsed = container.getAttribute('data-collapsed') === 'true';
          container.setAttribute('data-collapsed', isCollapsed ? 'false' : 'true');
        });
      });
    }

    // Selección de elementos del sidebar...
    function initSidebarSelection() {
      var containers = document.querySelectorAll('._4cc9ddf83d96bbf8--container.ContextL0MenuElement__container');

      function clearAllSelections() {
        document
          .querySelectorAll('._4cc9ddf83d96bbf8--container.ContextL0MenuElement__container._4cc9ddf83d96bbf8--containerHighlight')
          .forEach(function (el) {
            el.classList.remove('_4cc9ddf83d96bbf8--containerHighlight');
          });

        document
          .querySelectorAll('._4cc9ddf83d96bbf8--secondLevelLink.bancomicina-active')
          .forEach(function (el) {
            el.classList.remove('bancomicina-active');
          });
      }

      containers.forEach(function (container) {
        var headerBtn = container.querySelector('button._4cc9ddf83d96bbf8--header');
        var submenuWrapper = container.querySelector('.rah-static');
        var secondLevelLinks = container.querySelectorAll('._4cc9ddf83d96bbf8--secondLevelLink');

        var hasChildren = !!submenuWrapper && secondLevelLinks.length > 0;

        // SIN hijos → se selecciona el padre
        // SIN hijos → se selecciona el padre
        if (!hasChildren) {
          if (headerBtn) {
            headerBtn.addEventListener('click', function () {
              clearAllSelections();
              container.classList.add('_4cc9ddf83d96bbf8--containerHighlight');

              // Si es el item "Home", carga el contenido de home.html en el main content
              if (container.id === 'sidebar-item-home') {
                loadMainContent('home.html');
              }
            });
          }
          return;
        }

        // CON hijos → solo cuando se elige un hijo
        secondLevelLinks.forEach(function (link) {
          link.addEventListener('click', function () {
            clearAllSelections();
            container.classList.add('_4cc9ddf83d96bbf8--containerHighlight');
            link.classList.add('bancomicina-active');

            // Cargar Articles cuando se hace click en Library > Articles
            if (container.id === 'sidebar-item-library' &&
              link.dataset.e2eTestId === 'articles-sidebar-option') {
              loadMainContent('articles.html');
            }
          });
        });
      });
    }

    // Inicialización al cargar el DOM
    document.addEventListener('DOMContentLoaded', function () {
      try {
        initCollapsibleSidebar({
          containerSelector: '._4cc9ddf83d96bbf8--container.ContextL0MenuElement__container',
          headerSelector: 'button._4cc9ddf83d96bbf8--header',
          submenuSelector: '.rah-static'
        });

        initSidebarSelection();

        // ============================
        // Mostrar / ocultar barra lateral
        // ============================
        var sidebarWrapper = document.getElementById('sidebar-wrapper');
        var burgerBtn = document.querySelector(
          '.bb849ffc5190dffa--topNavStartContainer .css-1xxmsbp-StyledButton.ejph2fy0'
        );
        var collapseBtn = document.getElementById('sidebar-collapse-btn');

        function setSidebarVisible(visible) {
          if (!sidebarWrapper) return;

          if (visible) {
            sidebarWrapper.classList.remove('bancomicina-sidebar-hidden');
            document.body.classList.remove('sidebar-collapsed');
          } else {
            sidebarWrapper.classList.add('bancomicina-sidebar-hidden');
            document.body.classList.add('sidebar-collapsed');
          }

          if (burgerBtn) {
            burgerBtn.setAttribute('aria-expanded', visible ? 'true' : 'false');
          }
        }

        // Toggle desde el botón burger (top izquierda)
        if (burgerBtn && sidebarWrapper) {
          burgerBtn.addEventListener('click', function () {
            var isHidden = sidebarWrapper.classList.contains('bancomicina-sidebar-hidden');
            setSidebarVisible(isHidden);
          });
        }

        // Chevron dentro del sidebar → solo colapsa
        if (collapseBtn && sidebarWrapper) {
          collapseBtn.addEventListener('click', function () {
            setSidebarVisible(false);
          });
        }
      } catch (e) {
        console.error('Error al inicializar colapso de sidebar:', e);
      }
    });
  </script>
