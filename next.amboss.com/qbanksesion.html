  ._940d78d08f86143e--bottomBar {
    position: relative !important;

    flex-shrink: 0;
    width: 100% !important;

    z-index: 4;
    background: var(--color-background-primary);
    transition: left 0.2s ease, width 0.2s ease !important;
    border-top: none !important;

  /* Ensure button elements occupy full height and handle box-sizing */
  ._940d78d08f86143e--buttonContainer,
  .ecc37fb19efefaf4--container,
  ._5f39189d887435ab--buttonWrapper,
  ._5f39189d887435ab--buttonWrapper button,
  .ejph2fy1 {
    height: 100% !important;
    box-sizing: border-box !important;
  }

  /* Adjust left side button borders and transitions */
  ._940d78d08f86143e--leftSideButton {
    transition: width 0.3s ease, opacity 0.3s ease, transform 0.3s ease !important;
    border-top: none !important;

    align-items: center;

    width: 0 !important;
    opacity: 0 !important;
    border-right: none !important;

  ._940d78d08f86143e--primarySpace {

  }

  ._5f39189d887435ab--buttonWrapper button:not([disabled]):hover {
     background-color: #f3f4f6;
  }

    border-radius: 0 !important;
    border: none !important;

  .is-next-state:hover {
    background-color: #005f66 !important;

  .is-next-state .ecc37fb19efefaf4--buttonLabel,
  .is-next-state [data-testid="chevron-right"] svg,
  .is-next-state [data-e2e-test-id="chevron-right"] svg {

  }

  /* Style for the SEE ANALYSIS button on the last question */
  .see-analysis-btn {
    background-color: rgb(4, 122, 136) !important;
    border: 1px solid rgb(4, 122, 136) !important;
    transition: background-color 0.2s ease !important;
  }

  .see-analysis-btn:hover {
    background-color: rgb(3, 105, 117) !important;
  }

  .see-analysis-btn svg {
    color: white !important;

    height: 32px !important;

  /* Disabled button styling */
  button[disabled],
  button[disabled] .ecc37fb19efefaf4--buttonLabel,
  button[disabled] svg {
    color: #9ca3af !important;
    cursor: not-allowed !important;
    pointer-events: none;
  }
  
  button[disabled]:hover {
    background-color: transparent !important;
  }

  /* Smooth expansion/collapse animation */
  .rah-static {
    display: grid !important;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    grid-template-rows: 1fr;
  }

  .rah-static > div {
    min-height: 0;
    overflow: hidden;
  }

                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="m6 12 4-4-4-4"></path>
                          </svg>
                        </div>
                      </div>
                    </div>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>


  <script>
    (function () {
      // Reset selections and session history on start (UNLESS reviewing from Analytics)
      if (sessionStorage.getItem('isFromAnalysis') !== 'true') {
        ['userQuestionSelections', 'markedQuestions', 'answeredQuestions', 'questionStatusMap', 'previouslyAnswered', 'hintsUsed'].forEach(key => sessionStorage.removeItem(key));
      }

      // Global variables for question navigation
      let allQuestionIds = [];
      let currentQuestionIndex = 0;
      let subcategoryPath = '';

      // Initialize session timer
      window.sessionStartTime = Date.now();
      window.currentQuestionStartTime = Date.now(); // Line added

      // Get the subcategory path from sessionStorage (same as subcategoriacontent.html)
      subcategoryPath = sessionStorage.getItem('currentDocPath');

      if (!subcategoryPath) {
        console.error("❌ No subcategory path found in sessionStorage");
        showError("No subcategory selected. Please navigate from the Library.");
        return;
      }

      console.log("📚 Subcategory path from sessionStorage:", subcategoryPath);

      // Update page title/test-id with dynamic topic name
      if (typeof db !== "undefined") {
        db.doc(subcategoryPath).get().then(doc => {
          if (doc.exists) {
            const topicName = doc.data().titulo || doc.data().title || doc.data().denominacion || doc.data().nombre || "";
            const page = document.querySelector('.cd71ec7927bda3fc--page');
            if (page) {
              const fullText = `Questions based on "${topicName}" (not yet seen or skipped)Page`;
              page.setAttribute('data-e2e-test-id', fullText);
              page.setAttribute('data-testid', fullText);
              page.setAttribute('aria-label', `Questions based on "${topicName}"`);
            }
          }
        }).catch(err => console.error("Error fetching topic name for session page:", err));
      }

      // First, get all available questions from this subcategory
      const questionsCollectionPath = `${subcategoryPath}/preguntas`;

      console.log("🔍 Fetching all questions from:", questionsCollectionPath);

      if (typeof db === "undefined") {
        console.error("❌ Firebase db not initialized");
        showError("Firebase not initialized");
        return;
      }

      // Fetch all questions to get their IDs
      db.collection(questionsCollectionPath)
        .get()
        .then((querySnapshot) => {
          if (querySnapshot.empty) {
            console.error("❌ No questions found in this subcategory");
            showError("No questions available for this topic");
            return;
          }

          // Extract all question IDs and sort them
          allQuestionIds = querySnapshot.docs.map(doc => doc.id);

          const isFromAnalysis = sessionStorage.getItem('isFromAnalysis') === 'true';
          const sessionData = JSON.parse(sessionStorage.getItem('sessionAnalysisData') || '{}');
          if (sessionData && sessionData.sessionId) {
              console.log("📊 qbankAnalyticsSessions ID:", sessionData.sessionId);
          }
          const sessionIds = sessionData.questionIds;

          if (isFromAnalysis && Array.isArray(sessionIds)) {
            allQuestionIds = allQuestionIds.filter(id => sessionIds.includes(id))
                                           .sort((a, b) => sessionIds.indexOf(a) - sessionIds.indexOf(b));
          } else {
            allQuestionIds.sort((a, b) => {
              const na = Number(a), nb = Number(b);
              if (!Number.isNaN(na) && !Number.isNaN(nb)) return na - nb;
              return String(a).localeCompare(String(b), "es");
            });

            // Apply filters passed from Modal (status: unseen, correct, etc.)
            const storedFilteredIds = sessionStorage.getItem('qbankFilteredIds');
            if (storedFilteredIds) {
              try {
                const allowedIds = JSON.parse(storedFilteredIds);
                if (Array.isArray(allowedIds)) {
                  allQuestionIds = allQuestionIds.filter(id => allowedIds.includes(id));
                }
              } catch (e) {
                console.error("Error parsing filtered IDs:", e);
              }
            }

            // Apply limit from modal
            const sessionLimit = parseInt(sessionStorage.getItem('qbankSessionLimit') || '0');
            if (sessionLimit > 0 && sessionLimit < allQuestionIds.length) {
              allQuestionIds = allQuestionIds.slice(0, sessionLimit);
            }
          }

          console.log(`✅ Found ${allQuestionIds.length} questions:`, allQuestionIds);

          // Determine which question to load
          let questionId = sessionStorage.getItem('currentQuestionId');

          // Only use stored ID if it exists and is valid. 
          // If the user specifically requested "start at the beginning" behavior, we could ignore it,
          // but usually preserving state is desired. However, to ensure "previous" is inactive at start
          // if we are truly starting a session, we should default to 0 if the stored ID is not found.

          if (questionId && allQuestionIds.includes(questionId)) {
            // Use the specified question and find its index
            currentQuestionIndex = allQuestionIds.indexOf(questionId);
            console.log(`📍 Loading specified question: ${questionId} (index ${currentQuestionIndex})`);
          } else {
            // Default to the first question
            currentQuestionIndex = 0;
            questionId = allQuestionIds[0];
            sessionStorage.setItem('currentQuestionId', questionId); // Update session immediately
            console.log(`📍 Loading first question: ${questionId}`);
          }

          // Load the selected question
          loadQuestion(questionId);

          // Setup navigation buttons
          setupNavigationButtons();
          setupToolbarButtons();
        })
        .catch((error) => {
          console.error("❌ Error fetching questions:", error);
          showError("Error loading questions: " + error.message);
        });

      // Toolbar buttons setup
      function setupToolbarButtons() {
        // Shared helper to toggle button visual state (icon, class, underline)
        const toggleBtnState = (btn, isActive) => {
          btn.classList.toggle('active', isActive);
          btn.querySelector('.css-cjtild-StyledIcon')?.setAttribute('color', isActive ? 'brand' : 'inherit');
          const underline = btn.parentElement.querySelector('._6ccf46c0427cb323--underline');
          if (underline) underline.style.display = isActive ? 'block' : 'none';
        };

        // Key Info Button
        const keyInfoBtn = document.getElementById('keyInfoBtn');
        if (keyInfoBtn) {
          keyInfoBtn.addEventListener('click', () => {
            const content = document.querySelector('._760ee638b575af4a--questionContent');
            if (content) {
              const isActive = content.classList.toggle('_760ee638b575af4a--relevanceSecondaryHighlightIsActive');
              toggleBtnState(keyInfoBtn, isActive);
            }
          });
        }

        // Hint Button
        const hintBtn = document.querySelector('[data-e2e-test-id="hint-btn"]');
        if (hintBtn) {
          hintBtn.addEventListener('click', () => {
            const hintContainer = document.querySelector('.e0f0c237914d2b33--hintContainer');
            const wrapper = hintContainer?.closest('.rah-static');
            if (wrapper) {
              const isHidden = wrapper.style.display === 'none';
              wrapper.style.display = isHidden ? 'block' : 'none';
              wrapper.setAttribute('aria-hidden', !isHidden);
              toggleBtnState(hintBtn, isHidden);

              // Badge Visibility Logic
              const badge = document.getElementById('hint-used-badge');
              if (badge && isHidden) { // Only check when opening
                 const currentQId = sessionStorage.getItem('currentQuestionId');
                 
                 // Track hint usage
                 let hintsUsed = JSON.parse(sessionStorage.getItem('hintsUsed') || '[]');
                 if (!hintsUsed.includes(currentQId)) {
                   hintsUsed.push(currentQId);
                   sessionStorage.setItem('hintsUsed', JSON.stringify(hintsUsed));
                 }

                 if (!window.hasUserAnswered) {
                     badge.style.display = ''; // Show
                 } else {
                     badge.style.display = 'none'; // Hide
                 }
              }
            }
          });
        }
      }

      // In-memory cache for questions
      const questionCache = new Map();

      function loadQuestion(questionId) {
        // Update index to maintain strict order sync for navigation buttons
        const idx = allQuestionIds.indexOf(String(questionId));
        if (idx !== -1) currentQuestionIndex = idx;

        const questionPath = `${subcategoryPath}/preguntas/${questionId}`;
        console.log("🎯 Loading question from:", questionPath);

        // RESET STATE for new question
        window.hasUserAnswered = false;

        // Reset Toolbar Toggles (Key Info & Hint)
        [document.getElementById('keyInfoBtn'), document.querySelector('[data-e2e-test-id="hint-btn"]')].forEach(btn => {
          if (btn) {
            btn.classList.remove('active');
            btn.querySelector('.css-cjtild-StyledIcon')?.setAttribute('color', 'inherit');
            const underline = btn.parentElement.querySelector('._6ccf46c0427cb323--underline');
            if (underline) underline.style.display = 'none';
          }
        });
        document.querySelector('._760ee638b575af4a--questionContent')?.classList.remove('_760ee638b575af4a--relevanceSecondaryHighlightIsActive');
        
        // Reset Hint Used Badge
        const badge = document.getElementById('hint-used-badge');
        if (badge) badge.style.display = '';
        
        // Hide all expandable containers instantly
        document.querySelectorAll('.rah-static').forEach(el => {
            el.style.display = 'none';
            el.setAttribute('aria-hidden', 'true');
        });

        // --- TRACK TIME PER QUESTION ---
        if (window.currentQuestionId) {
            const timeSpent = Math.floor((Date.now() - (window.currentQuestionStartTime || Date.now())) / 1000);
            const questionTimes = JSON.parse(sessionStorage.getItem('questionTimes') || '{}');
            questionTimes[window.currentQuestionId] = (questionTimes[window.currentQuestionId] || 0) + timeSpent;
            sessionStorage.setItem('questionTimes', JSON.stringify(questionTimes));
        }
        window.currentQuestionId = questionId;
        window.currentQuestionStartTime = Date.now();
        // --------------------------------

        // CHECK CACHE FIRST
        if (questionCache.has(questionId)) {
          console.log("⚡️ Using cached question data");
          const data = questionCache.get(questionId);
          processQuestionData(questionId, data);

          // Prefetch next question in background
          prefetchNextQuestion(questionId);
          return;
        }

        db.doc(questionPath)
          .get()
          .then((doc) => {
            if (doc.exists) {
              const data = doc.data();
              console.log("✅ Question data loaded (network):", data);

              // CACHE THE RESULT
              questionCache.set(questionId, data);

              processQuestionData(questionId, data);

              // Prefetch next question in background
              prefetchNextQuestion(questionId);
            } else {
              console.error("❌ Question not found at path:", questionPath);
              showError("Question not found in database");
            }
          })
          .catch((error) => {
            console.error("❌ Error loading question:", error);
            showError("Error loading question: " + error.message);
            // Hide spinner even on error so user sees the error message
            const loader = document.getElementById('initial-loader');
            const content = document.querySelector('.cd71ec7927bda3fc--page');
            if (loader) loader.style.display = 'none';
            if (content) content.style.display = 'block';
          });
      }

      function processQuestionData(questionId, data) {
        // Toggle loader visibility
        const loader = document.getElementById('initial-loader');
        const content = document.querySelector('.cd71ec7927bda3fc--page');
        
        if (loader) loader.style.display = 'none';
        if (content) content.style.display = 'block';

        // Save current question ID to sessionStorage
        sessionStorage.setItem('currentQuestionId', questionId);

        // Dispatch event for sidebar to pick up
        const event = new CustomEvent('amboss:question-loaded', { detail: { questionId: questionId } });
        window.dispatchEvent(event);

        // Populate question content
        populateQuestionContent(data);

        // Update navigation button states
        updateNavigationButtons();

        // Restore user selections
        const savedSelections = JSON.parse(sessionStorage.getItem('userQuestionSelections') || '{}');
        const selections = savedSelections[questionId];
        if (selections) {
          (Array.isArray(selections) ? selections : [selections]).forEach(letter => {
            const container = document.querySelector(`[data-option-letter="${letter}"]`);
            if (container) selectAnswer(letter, container.getAttribute('data-is-correct') === 'true', false);
          });
        } else if (sessionStorage.getItem('isFromAnalysis') === 'true') {
          // Fetch from Firestore if reviewing from analysis and no local session data
          const user = firebase.auth().currentUser;
          if (user) {
            // First check if we have the choice in the session data (passed from analysis)
            const sessionData = JSON.parse(sessionStorage.getItem('sessionAnalysisData') || '{}');
            if (sessionData.questionChoices && Object.prototype.hasOwnProperty.call(sessionData.questionChoices, questionId)) {
                 const letter = sessionData.questionChoices[questionId];
                 if (letter) {
                    console.log(`Reviewing session: Restoring choice ${letter} for question ${questionId}`);
                    const container = document.querySelector(`[data-option-letter="${letter}"]`);
                    if (container) selectAnswer(letter, container.getAttribute('data-is-correct') === 'true', false);
                 } else {
                    console.log(`Reviewing session: No choice made for question ${questionId} in this session.`);
                 }
            } else {
                // Fallback: Fetch globally saved last choice (legacy behavior)
                window.db.collection("users").doc(user.uid).collection("qbankQuestionStats").doc(questionId).get().then(doc => {
                  if (doc.exists && doc.data().lastChoice) {
                    const letter = doc.data().lastChoice;
                    const container = document.querySelector(`[data-option-letter="${letter}"]`);
                    if (container) selectAnswer(letter, container.getAttribute('data-is-correct') === 'true', false);
                  }
                }).catch(e => console.error("Error fetching previous choice for review:", e));
            }
          }
        }
      }

      function prefetchNextQuestion(currentId) {
        const currentIndex = allQuestionIds.indexOf(currentId);
        if (currentIndex !== -1 && currentIndex < allQuestionIds.length - 1) {
          const nextId = allQuestionIds[currentIndex + 1];
          if (!questionCache.has(nextId)) {
            console.log("🚀 Prefetching next question:", nextId);
            const nextPath = `${subcategoryPath}/preguntas/${nextId}`;
            db.doc(nextPath).get().then(doc => {
              if (doc.exists) {
                questionCache.set(nextId, doc.data());
              }
            }).catch(() => { /* mute error for prefetch */ });
          }
        }
      }

      // Expose to window for sidebar access
      window.loadQuestion = loadQuestion;

      function setupNavigationButtons() {
        const prevButton = document.querySelector('[data-e2e-test-id="prev-button"]');
        const nextButton = document.querySelector('[data-e2e-test-id="next-button"]');

        if (prevButton) {
          prevButton.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
              currentQuestionIndex--;
              const questionId = allQuestionIds[currentQuestionIndex];
              console.log(`⬅️ Previous: Loading question ${questionId}`);
              loadQuestion(questionId);
            }
          });
        }

        if (nextButton) {
          nextButton.addEventListener('click', () => {
            if (currentQuestionIndex < allQuestionIds.length - 1) {
              const currentQId = allQuestionIds[currentQuestionIndex];
              if (!window.hasUserAnswered) {
                let prev = JSON.parse(sessionStorage.getItem('previouslyAnswered') || '[]');
                if (!prev.includes(currentQId)) { 
                  prev.push(currentQId); 
                  sessionStorage.setItem('previouslyAnswered', JSON.stringify(prev));
                  window.dispatchEvent(new CustomEvent('amboss:question-skipped', { detail: { questionId: currentQId } }));

                  // Save "skip" as selection
                  const sels = JSON.parse(sessionStorage.getItem('userQuestionSelections') || '{}');
                  if (!sels[currentQId]) {
                      sels[currentQId] = ['skip'];
                      sessionStorage.setItem('userQuestionSelections', JSON.stringify(sels));
                  }
                  
                  // Save to Firestore
                  const user = firebase.auth().currentUser;
                  if (user) {
                    window.db.collection("users").doc(user.uid).collection("qbankQuestionStats").doc(currentQId).set({
                      lastChoice: "skip",
                      isCorrect: "skipped",
                      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true }).catch(e => console.error("Error saving skip choice:", e));
                    console.log(`✅ "skip" choice saved to Firestore for ${currentQId}`);
                  }
                }
              }
              currentQuestionIndex++;
              const questionId = allQuestionIds[currentQuestionIndex];
              console.log(`➡️ Next: Loading question ${questionId}`);
              loadQuestion(questionId);
            } else {
               // --- GATHER DATA FOR ANALYSIS ---
              const answeredQuestions = JSON.parse(sessionStorage.getItem('answeredQuestions') || '[]');
              const questionStatusMap = JSON.parse(sessionStorage.getItem('questionStatusMap') || '{}');
              const hintsUsed = JSON.parse(sessionStorage.getItem('hintsUsed') || '[]');
              
              let correctCount = 0;
              let correctWithHintsCount = 0;
              let incorrectCount = 0;

              answeredQuestions.forEach(qId => {
                const status = questionStatusMap[qId];
                const usedHint = hintsUsed.includes(qId);
                
                if (status === 'correct') {
                  correctCount++;
                } else if (status === 'correctWithHelp') {
                  correctWithHintsCount++;
                } else if (status === 'incorrect') {
                  incorrectCount++;
                }
              });
              
              const totalTimeSeconds = Math.floor((Date.now() - (window.sessionStartTime || Date.now())) / 1000);
              const questionTimes = JSON.parse(sessionStorage.getItem('qTimes') || '{}');
              const totalActiveSeconds = Object.values(questionTimes).reduce((a, b) => a + b, 0);

              const sessionAnalysisData = {
                totalQuestions: allQuestionIds.length,
                questionIds: allQuestionIds,
                answeredCount: answeredQuestions.length,
                correctCount: correctCount,
                correctWithHintsCount: correctWithHintsCount,
                incorrectCount: incorrectCount,
                totalTimeSeconds: totalTimeSeconds,
                totalActiveSeconds: totalActiveSeconds,
                questionTimes: questionTimes,
                timestamp: Date.now()
              };
              
              sessionStorage.setItem('sessionAnalysisData', JSON.stringify(sessionAnalysisData));
              console.log("📊 Session data saved for analysis:", sessionAnalysisData);
              // --------------------------------

              // --- FIREBASE SAVE LOGIC ---
              const finishSession = () => {
                if (typeof minimizeSidebar === 'function' && typeof loadMainContent === 'function') {
                  minimizeSidebar('sidebartoc3.html');
                  loadMainContent('analysis.html');
                } else {
                  window.location.href = 'analysis.html';
                }
              };

              const user = firebase.auth().currentUser;
              if (user) {
                const analyticsData = {
                  avgTimeMs: answeredQuestions.length > 0 ? (totalActiveSeconds / answeredQuestions.length) * 1000 : 0,
                  categoriaId: sessionStorage.getItem('currentDocPath') || 'unknown',
                  completedCount: answeredQuestions.length,
                  correctCount: correctCount,
                  correctUsingHints: correctWithHintsCount,
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  incorrectCount: incorrectCount,
                  pendingCount: allQuestionIds.length - answeredQuestions.length,
                  questionTimeMs: totalActiveSeconds * 1000,
                  questions: allQuestionIds.map((qId, index) => {
                      const qData = questionCache.get(qId) || {};
                      const status = questionStatusMap[qId] || 'pending';
                      const qTime = questionTimes[qId] || 0;
                      
                      // Get user choice for this question
                      const allSelections = JSON.parse(sessionStorage.getItem('userQuestionSelections') || '{}');
                      const mySel = allSelections[qId];
                      const finalChoice = Array.isArray(mySel) ? mySel[mySel.length-1] : mySel;

                      return {
                          difficultyLabel: qData.difficulty || 'Medium',
                          difficultyValue: qData.difficultyValue || 2,
                          index: index + 1,
                          peerPercent: qData.peerStats ? parseFloat(qData.peerStats) : null,
                          question: index + 1,
                          questionId: qId,
                          statusKey: status,
                          timeMs: qTime * 1000,
                          userChoice: finalChoice || null
                      };
                  })
                };

                db.collection('users').doc(user.uid).collection('qbankAnalyticsSessions').add(analyticsData)
                  .then(() => {
                    console.log("✅ Analytics saved to Firestore");
                    finishSession();
                  })
                  .catch(err => {
                    console.error("❌ Error saving analytics:", err);
                    finishSession();
                  });
              } else {
                finishSession();
              }
              // ---------------------------
            }
          });
        }

        updateNavigationButtons();
      }

      function updateNavigationButtons() {
        const prevButton = document.querySelector('[data-e2e-test-id="prev-button"]');
        const nextButton = document.querySelector('[data-e2e-test-id="next-button"]');
        const nextLabel = nextButton ? nextButton.querySelector('.ecc37fb19efefaf4--buttonLabel') : null;

        if (prevButton) {
          if (currentQuestionIndex === 0) {
            prevButton.setAttribute('disabled', '');
            prevButton.classList.add('css-12n0i9h-StyledButton');
            prevButton.classList.remove('css-xaqme7-StyledButton');
          } else {
            prevButton.removeAttribute('disabled');
            prevButton.classList.remove('css-12n0i9h-StyledButton');
            prevButton.classList.add('css-xaqme7-StyledButton');
          }
        }

        if (nextButton) {
          if (currentQuestionIndex === allQuestionIds.length - 1) {
            nextButton.removeAttribute('disabled');
            nextButton.classList.remove('css-12n0i9h-StyledButton');
            nextButton.classList.add('css-xaqme7-StyledButton');
            nextButton.classList.add('see-analysis-btn');
            if (nextLabel) nextLabel.textContent = 'SEE ANALYSIS';
          } else {
            nextButton.removeAttribute('disabled');
            nextButton.classList.remove('css-12n0i9h-StyledButton');
            nextButton.classList.add('css-xaqme7-StyledButton');
            nextButton.classList.remove('see-analysis-btn');

            // Check if answered
            if (window.hasUserAnswered) {
              nextButton.classList.add('is-next-state');
              if (nextLabel) nextLabel.textContent = 'NEXT';
            } else {
              nextButton.classList.remove('is-next-state');
              if (nextLabel) nextLabel.textContent = 'SKIP';
            }
          }
        }

        console.log(`📊 Navigation: ${currentQuestionIndex + 1}/${allQuestionIds.length}`);
      }

      function populateQuestionContent(data) {
        // Update question text in main article
        let questionHtml = '';
        if (data.questionContent && data.questionContent.textHtml) {
          questionHtml = data.questionContent.textHtml;
        } else if (data.questionContent && data.questionContent.text) {
          questionHtml = `<p>${data.questionContent.text}</p>`;
        } else if (data.questionText) {
          questionHtml = data.questionText.includes('<') ? data.questionText : `<p>${data.questionText}</p>`;
        }

        if (questionHtml) {
          const questionArticle = document.querySelector('._760ee638b575af4a--questionContent');
          if (questionArticle) {
            questionArticle.innerHTML = questionHtml;
            console.log("✅ Question text populated");
          }
        }

        // Update sidebar preview text
        let previewText = '';
        if (data.questionPreview) {
          previewText = data.questionPreview;
        } else if (data.questionContent && data.questionContent.text) {
          previewText = data.questionContent.text;
        } else if (questionHtml) {
          previewText = stripHTML(questionHtml);
        }

        if (previewText && window.sessionStorage.getItem('currentQuestionId')) {
          const currentQId = window.sessionStorage.getItem('currentQuestionId');
          // Update ONLY the sidebar item for THIS question
          const sidebarPreview = document.getElementById(`preview-${currentQId}`);
          if (sidebarPreview) {
            // Only update if empty or significantly different? 
            // Actually, the sidebar loads its own data. 
            // If we want to ensure it has the "full" text from the active load:
            sidebarPreview.textContent = previewText.substring(0, 500);
            console.log(`✅ Sidebar preview updated for ${currentQId}`);
          }
        }

        // Update hint text
        let hintHtml = '';

        if (data.hint && data.hint.textHtml) {
          // 🔹 Usa la versión rica en HTML (con links, spans, etc.)
          hintHtml = data.hint.textHtml;
        } else if (data.hint && data.hint.text) {
          // 🔹 Fallback a texto plano si no hay HTML
          hintHtml = `<p>${data.hint.text}</p>`;
        } else if (data.hintText) {
          // 🔹 Compatibilidad vieja
          hintHtml = data.hintText.includes('<') ? data.hintText : `<p>${data.hintText}</p>`;
        }

        if (hintHtml) {
          const hintArticle = document.querySelector('.e0f0c237914d2b33--hintText');
          if (hintArticle) {
            hintArticle.innerHTML = hintHtml;
            console.log("✅ Hint text populated (HTML)");
          }
        }

        // Update question media/images
        let mediaUrl = data.mediaUrl;
        let mediaAlt = data.mediaAlt;

        if (!mediaUrl && data.questionContent && data.questionContent.images && data.questionContent.images.length > 0) {
          mediaUrl = data.questionContent.images[0].src;
          mediaAlt = data.questionContent.images[0].alt;
        }

        const mediaButton = document.querySelector('._26c6d085fbfd0c71--mediaViewerTrigger');
        const mediaImg = document.querySelector('._26c6d085fbfd0c71--mediaViewerTrigger img');

        if (mediaUrl && mediaButton && mediaImg) {
          mediaImg.src = mediaUrl;
          mediaImg.alt = mediaAlt || '';
          mediaButton.style.display = 'block'; // Show the button
          console.log("✅ Media image populated");
        } else if (mediaButton) {
          mediaButton.style.display = 'none'; // Hide if no image
        }

        // Populate answer options
        if (data.options && Array.isArray(data.options)) {
          populateAnswerOptions(data.options, data.correctAnswer);
        }

        // Update difficulty hammers
        const difficulty = data.metadata?.difficulty || data.difficulty;
        if (difficulty) {
          updateDifficultyHammers(difficulty);
        }

        // Add AMBOSS links if available
        if (data.ambossLinks && Array.isArray(data.ambossLinks)) {
          addAmbossLinks(data.ambossLinks);
        }
        // Update toggle button state
        updateToggleBtnState();
        updateResetButtonState();
      }

      function updateDifficultyHammers(difficulty) {
        // difficulty should be 1-5
        const hammersContainer = document.querySelector('[data-e2e-test-id^="difficulty-hammers"]');
        if (!hammersContainer) return;
        
        // Update the ID to match current difficulty (optional but good for consistency)
        hammersContainer.setAttribute('data-e2e-test-id', `difficulty-hammers-${difficulty}`);

        const hammerIcons = hammersContainer.querySelectorAll('[data-testid="difficulty-hammer"]');
        hammerIcons.forEach((hammer, index) => {
          if (index < difficulty) {
            hammer.setAttribute('color', 'secondary');
            hammer.classList.add('active');
          } else {
            hammer.setAttribute('color', 'inherit');
            hammer.classList.remove('active');
          }
        });
        console.log(`✅ Difficulty set to ${difficulty} hammers`);
      }

        // Check if the option is struck through

                container.classList.add('_981f8b48b6542a07--incorrectAnswer');
                container.setAttribute('data-e2e-test-id', 'answer-theme-answerOptionIncorrect');

                // Marcar el círculo con borde rojo
                const letterCircle = container.querySelector('[data-test-id="CircledCharacter"]');
                if (letterCircle) {
                  letterCircle.classList.add('_29aad051d1626085--error');
                }

                // Mostrar ícono minus rojo
                const iconContainer = container.querySelector('._981f8b48b6542a07--clickableIconContainer');
                const iconDiv = container.querySelector('._981f8b48b6542a07--icon');
                if (iconContainer && iconDiv) {
                  iconContainer.style.display = 'flex';
                  iconContainer.setAttribute('data-testid', 'minusIcon');
                  iconDiv.classList.add('_981f8b48b6542a07--redIcon');
                  iconDiv.innerHTML = `
              <div data-ds-id="Icon" data-variant="inherit" color="inherit" class="css-cjtild-StyledIcon e1kkd7uc0">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="2" d="M4 8h8"></path>
                </svg>
              </div>
            `;
                }
              }
            });
          }
        } else {
          console.log('⏸️ Primer intento incorrecto - no se revela la respuesta correcta aún');
        }

        // 5) Mostrar explicación de la respuesta seleccionada
        if (wrapper && explanationDiv) {
          if (showExplanation) {
            wrapper.style.display = 'block';
            wrapper.setAttribute('aria-hidden', 'false');
            
            // Auto-select ATTENDING TIPS if correct
            if (isCorrect) {
               const hintBtn = document.querySelector('[data-e2e-test-id="hint-btn"]');
               const hintWrapper = document.querySelector('.e0f0c237914d2b33--hintContainer')?.closest('.rah-static');
               if (hintBtn && hintWrapper && hintWrapper.style.display === 'none') {
                   hintBtn.click();
               }
            }
            
            // Apply correct with help color to explanation if applicable
            if (isCorrect && usedHelpBeforeAnswering) {
                explanationDiv.classList.add('_981f8b48b6542a07--correctWithHelpExplanation');
            }
          }

          // Agregar clase según si es correcta o incorrecta
          if (isCorrect) {
            explanationDiv.classList.add('_981f8b48b6542a07--correctAnswerExplanation');
          } else if (isFirstAttempt) {
            // Solo primer intento incorrecto tiene la línea roja
            explanationDiv.classList.add('_981f8b48b6542a07--incorrectFirstExplanation');
          }

          explanationDiv.style.display = 'block';
          // NO aplicar borderColor inline, dejar que el CSS lo maneje mediante las clases
        }

        // Marcar que el usuario ya ha respondido
        window.hasUserAnswered = true;

        if (isCorrect) {
          console.log("✅ Correct answer!");
        } else {
          console.log("❌ Incorrect answer");
        }

        // 6) Save answered state and notify sidebar
        let answeredQuestions = JSON.parse(sessionStorage.getItem('answeredQuestions') || '[]');
        const currentQId = sessionStorage.getItem('currentQuestionId');
        if (currentQId && !answeredQuestions.includes(currentQId)) {
          answeredQuestions.push(currentQId);
          sessionStorage.setItem('answeredQuestions', JSON.stringify(answeredQuestions));
        }

        // Save correctness status specially for the sidebar
        let questionStatusMap = JSON.parse(sessionStorage.getItem('questionStatusMap') || '{}');
        if (currentQId) {
          if (isCorrect) {
            questionStatusMap[currentQId] = usedHelpBeforeAnswering ? 'correctWithHelp' : 'correct';
          } else {
            questionStatusMap[currentQId] = 'incorrect';
          }
          sessionStorage.setItem('questionStatusMap', JSON.stringify(questionStatusMap));
        }

        // Update toggle button
        updateToggleBtnState();
        updateResetButtonState();

        // Dispatch event so sidebar updates immediately
        window.dispatchEvent(new CustomEvent('amboss:question-answered', {
          detail: { 
            questionId: currentQId, 
            isCorrect: isCorrect,
            isWithHelp: usedHelpBeforeAnswering
          }
        }));

        // Hide hint used badge upon answering
        const badge = document.getElementById('hint-used-badge');
        if (badge) badge.style.display = 'none';

        // Update navigation buttons to reflect the "Answered" state (SKIP -> NEXT)
        updateNavigationButtons();

          answerContainer.setAttribute('aria-disabled', isStruck);

          console.log(`Strike-through toggled for option ${letter}: ${isStruck}`);
        }
      };
    })();

  <script>
    (function () {
      const container = document.querySelector("._6ccf46c0427cb323--toolbarSectionsContainer");
      const leftSection = document.querySelector("._6ccf46c0427cb323--toolbarSectionLeft");
      const rightSection = document.querySelector("._6ccf46c0427cb323--actionItemsContainer");
      const menuList = document.querySelector("#dropdown-menu-content .css-1uo4gqj-StyledUl");

      if (!container || !leftSection || !rightSection || !menuList) return;

      const originalInfo = new Map();
      let requiredWidth = 0;

      function handleResponsiveActions() {
        // Measure the theoretical required width once
        if (requiredWidth === 0 && menuList.dataset.actionsLocation !== "menu") {
          requiredWidth = rightSection.offsetWidth;
        }

        const containerWidth = container.offsetWidth;
        const leftWidth = leftSection.offsetWidth;
        const availableWidth = containerWidth - leftWidth;
        const threshold = 40; // Buffer space
        
        const shouldCollide = availableWidth < (requiredWidth || 300) + threshold;
        const isMenu = menuList.dataset.actionsLocation === "menu";

        if (shouldCollide && !isMenu) {
          // Move from toolbar to menu
          const buttons = rightSection.querySelectorAll('button[data-toolbar-action="true"]');
          buttons.forEach(btn => {
            if (!originalInfo.has(btn)) {
              originalInfo.set(btn, { parent: btn.parentElement, className: btn.className });
            }
            const li = document.createElement("li");
            li.className = "css-11e3c5f-StyledLi e1t5eegs2";
            li.dataset.toolbarAction = "true";
            li.setAttribute("role", "menuitem");
            
            btn.className = "css-1l6xhu8-StyledMenuItem emlyvnc0";
            li.appendChild(btn);
            menuList.insertBefore(li, menuList.firstChild);
          });
          menuList.dataset.actionsLocation = "menu";
        } else if (!shouldCollide && isMenu) {
          // Restore from menu to toolbar
          const lis = Array.from(menuList.querySelectorAll('li[data-toolbar-action="true"]')).reverse();
          lis.forEach(li => {
            const btn = li.querySelector('button[data-toolbar-action="true"]');
            if (btn) {
              const info = originalInfo.get(btn);
              if (info) {
                info.parent.appendChild(btn);
                btn.className = info.className;
              }
            }
            li.remove();
          });
          delete menuList.dataset.actionsLocation;
        }
      }

      // Execute on load and resize
      window.addEventListener("load", handleResponsiveActions);
      window.addEventListener("resize", handleResponsiveActions);
      
      // Listen for split view changes from parent
      window.addEventListener('amboss:splitview-toggled', () => {
        // Delay measurement slightly to allow CSS transitions/layout to finish
        setTimeout(handleResponsiveActions, 100);
      });

      // Also watch for container resize using ResizeObserver if available
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(() => handleResponsiveActions());
        ro.observe(container);
      }
    })();
  </script>

  <script>
    (function() {
      window.toggleExplanations = function() {
        const textSpan = document.getElementById('toggle-explanations-text');
        if (!textSpan) return;
        const currentText = textSpan.textContent.trim();

        if (currentText === 'SHOW ANSWER') {
           const correctContainer = document.querySelector('[data-is-correct="true"]');
           if (correctContainer) {
             const letter = correctContainer.getAttribute('data-option-letter');
             selectAnswer(letter, true, true);
           }
        } else if (currentText === 'SHOW ALL EXPLANATIONS') {
           document.querySelectorAll('.rah-static').forEach(el => {
             el.style.display = 'block';
             el.setAttribute('aria-hidden', 'false');
           });
        } else if (currentText === 'HIDE ALL EXPLANATIONS') {
           document.querySelectorAll('.rah-static').forEach(el => {
             el.style.display = 'none';
             el.setAttribute('aria-hidden', 'true');
           });
        }
        updateToggleBtnState();
      };

      window.updateToggleBtnState = function() {
        const textSpan = document.getElementById('toggle-explanations-text');
        if (!textSpan) return;

        const correctContainer = document.querySelector('[data-is-correct="true"]');
        const isCorrectRevealed = correctContainer && (
            correctContainer.classList.contains('_981f8b48b6542a07--correctAnswer') || 
            correctContainer.classList.contains('_981f8b48b6542a07--selected')
        );

        if (!window.hasUserAnswered || !isCorrectRevealed) {
            textSpan.textContent = 'SHOW ANSWER';
        } else {
            const allWrappers = document.querySelectorAll('.rah-static');
            const totalCount = allWrappers.length;
            const visibleCount = Array.from(allWrappers).filter(el => el.style.display !== 'none').length;
            textSpan.textContent = (visibleCount < totalCount) ? 'SHOW ALL EXPLANATIONS' : 'HIDE ALL EXPLANATIONS';
        }
      };

      window.resetQuestion = function() {
        const currentQId = sessionStorage.getItem('currentQuestionId');
        if (currentQId) {
          document.querySelectorAll('.rah-static').forEach(el => {
            el.style.display = 'none';
            el.setAttribute('aria-hidden', 'true');
          });

          setTimeout(() => {
            // Clear selections
            const sels = JSON.parse(sessionStorage.getItem('userQuestionSelections') || '{}');
            delete sels[currentQId];
            sessionStorage.setItem('userQuestionSelections', JSON.stringify(sels));

            // Clear answered state for this question
            let answered = JSON.parse(sessionStorage.getItem('answeredQuestions') || '[]');
            if (answered.includes(currentQId)) {
              let prev = JSON.parse(sessionStorage.getItem('previouslyAnswered') || '[]');
              if (!prev.includes(currentQId)) { prev.push(currentQId); sessionStorage.setItem('previouslyAnswered', JSON.stringify(prev)); }
            }
            sessionStorage.setItem('answeredQuestions', JSON.stringify(answered.filter(id => id !== currentQId)));
            
            let statusMap = JSON.parse(sessionStorage.getItem('questionStatusMap') || '{}');
            delete statusMap[currentQId];
            sessionStorage.setItem('questionStatusMap', JSON.stringify(statusMap));

            loadQuestion(currentQId);
          }, 300);
        }
      };

      window.updateResetButtonState = function() {
        const btn = document.getElementById('reset-question-btn');
        if (btn) {
          btn.disabled = !window.hasUserAnswered;
          
          // Hide button if coming from Analysis
          if (sessionStorage.getItem('isFromAnalysis') === 'true') {
            const container = btn.closest('.css-h0nko7-StyledInlineItem');
            if (container) container.style.display = 'none';
          }
        }
      };

      window.toggleMark = function() {
        const currentQId = sessionStorage.getItem('currentQuestionId');
        if (!currentQId) return;
        
        let markedQuestions = JSON.parse(sessionStorage.getItem('markedQuestions') || '[]');
        const isMarked = markedQuestions.includes(currentQId);
        
        if (isMarked) {
          markedQuestions = markedQuestions.filter(id => id !== currentQId);
        } else {
          markedQuestions.push(currentQId);
        }
        
        sessionStorage.setItem('markedQuestions', JSON.stringify(markedQuestions));
        
        window.dispatchEvent(new CustomEvent('amboss:question-marked', {
          detail: { questionId: currentQId, isMarked: !isMarked }
        }));
      };
    })();
  </script>

  <script>
    (function () {
      // ========= CONFIG =========
      const TRIGGER_SEL = '.toolbar-fontsize-btn';
      const MIN = 0.85;
      const MAX = 1.15;
      const STEP = 0.05;
      const DEFAULT = 1.00;

      const TARGET_ROOT = document.documentElement;
      const STORAGE_KEY = 'bancomicina_qbank_fontScale';

      let isOpen = false;
      let currentTrigger = null;

      function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

      function getScale() {
        const saved = Number(localStorage.getItem(STORAGE_KEY));
        if (Number.isFinite(saved) && saved > 0) return clamp(saved, MIN, MAX);
        return DEFAULT;
      }

      function setScale(v) {
        const scale = clamp(Number(v), MIN, MAX);
        TARGET_ROOT.style.setProperty('--qbank-font-scale', String(scale));
        localStorage.setItem(STORAGE_KEY, String(scale));
        updateUI(scale);
        if (isOpen && currentTrigger) requestAnimationFrame(() => positionPopover(currentTrigger));
      }

      // ========= INJECT CSS =========
      const style = document.createElement('style');
      style.textContent = `
        :root { --qbank-font-scale: ${DEFAULT}; }

        /* Scope strictly to QBank main containers to avoid compounding scale on nested spans */
        ._760ee638b575af4a--questionContent,
        ._981f8b48b6542a07--answerContent,
        ._981f8b48b6542a07--explanationContainer,
        .e0f0c237914d2b33--hintText {
          font-size: calc(1em * var(--qbank-font-scale)) !important;
        }

        #qbank-font-size-popover {
          position: fixed; z-index: 90; background: #fff;
          border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 6px;
          box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
          width: 112px; height: 48px; padding: 8px; box-sizing: border-box;
          opacity: 0; visibility: hidden; pointer-events: none;
          transition: opacity 0.1s ease, visibility 0.1s ease;
        }
        #qbank-font-size-popover.is-visible {
          opacity: 1; visibility: visible; pointer-events: auto;
        }
        .banco-font-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; height: 100%; }
        .banco-font-btn {
          width: 32px; height: 32px; border: 0; background: transparent; border-radius: 4px;
          display: flex; align-items: center; justify-content: center; cursor: pointer; color: #0f172a;
        }
        .banco-font-btn:hover:not([disabled]) { background: rgba(15, 23, 42, 0.06); }
        .banco-font-btn[disabled] { opacity: 0.3; cursor: not-allowed; }
      `;
      document.head.appendChild(style);

      // ========= CREATE POPOVER =========
      const popover = document.createElement('div');
      popover.id = 'qbank-font-size-popover';
      popover.innerHTML = `
        <div class="banco-font-controls">
          <button data-action="dec" data-e2e-test-id="decrease-font-size-button" type="button" aria-label="Decrease font size" class="banco-font-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" fill="none" viewBox="0 0 16 16" aria-hidden="true">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="2" d="M4 8h8"></path>
            </svg>
          </button>

          <button data-action="rst" data-e2e-test-id="reset-font-size-button" type="button" aria-label="Reset font size" class="banco-font-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
              <path fill="currentColor" fill-rule="evenodd" d="M8.372 13h-2.81l-.596-1.6H2.293L1.697 13H0l2.885-7.75h1.488l2.32 6.231L10.063 3h1.967L16 13h-2.282l-.848-2.134H9.22zM3.63 7.81 4.47 10H2.79zM12.15 9l-1.105-2.73L9.92 9z" clip-rule="evenodd"></path>
            </svg>
          </button>

          <button data-action="inc" data-e2e-test-id="increase-font-size-button" type="button" aria-label="Increase font size" class="banco-font-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" fill="none" viewBox="0 0 16 16" aria-hidden="true">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="2" d="M4 8h8M8 4v8"></path>
            </svg>
          </button>
        </div>
      `;
      document.body.appendChild(popover);

      function updateUI(scale) {
        popover.querySelector('[data-action="dec"]').disabled = scale <= MIN;
        popover.querySelector('[data-action="inc"]').disabled = scale >= MAX;
        popover.querySelector('[data-action="rst"]').disabled = Math.abs(scale - DEFAULT) < 0.001;
      }

      function positionPopover(el) {
        const r = el.getBoundingClientRect();
        popover.style.top = `${Math.round(r.bottom + 8)}px`;
        popover.style.left = `${Math.round(r.left + r.width / 2 - 56)}px`;
      }

      function toggle(el) {
        if (isOpen) {
          popover.classList.remove('is-visible');
          isOpen = false;
        } else {
          currentTrigger = el;
          positionPopover(el);
          popover.classList.add('is-visible');
          isOpen = true;
        }
      }

      document.addEventListener('click', e => {
        const trigger = e.target.closest(TRIGGER_SEL);
        if (trigger) { e.preventDefault(); e.stopPropagation(); toggle(trigger); return; }
        if (isOpen && !e.target.closest('#qbank-font-size-popover')) { popover.classList.remove('is-visible'); isOpen = false; }
      }, true);

      popover.addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (!btn || btn.disabled) return;
        const act = btn.dataset.action;
        if (act === 'dec') setScale(getScale() - STEP);
        else if (act === 'inc') setScale(getScale() + STEP);
        else if (act === 'rst') setScale(DEFAULT);
      });

      setScale(getScale());

      window.addEventListener('resize', () => isOpen && currentTrigger && positionPopover(currentTrigger));
      window.addEventListener('scroll', () => isOpen && currentTrigger && positionPopover(currentTrigger), true);
    })();
  </script>
