<style>

  [data-type="dosageEntity"] {
    display: inline-flex;
    align-items: center;
    background-color: rgb(218, 208, 244);
    color: #32363e;
    border-radius: 20px;
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    vertical-align: middle;
    margin: 0 4px;
    line-height: 1.6;
    height: 16px;
    white-space: nowrap;
  }
  [data-type="dosageEntity"] span {
    display: inline-flex;
    align-items: center;
  }
  [data-type="dosageEntity"] svg {
    width: 12px;
    height: 12px;
    margin-left: 2px;
    stroke-width: 2.5;
  }
  [data-type="dosageEntity"]:hover {
    background-color: #dcdcff;
  }
  /* Estilos para los enlaces dentro de los popups de referencia */
  .reference-popup-content a[color="accent"], 
  .reference-popup-content a[color="accent"] span,
  .reference-popup-content a[color="accent"] svg {
    color: rgb(4, 122, 136) !important;
  }
  .reference-popup-content a[color="primary"],
  .reference-popup-content a[color="primary"] span,
  .reference-popup-content a[color="primary"] svg {
    color: inherit !important;
  }
  .reference-popup-content a {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    gap: 4px;
    text-decoration: none;
  }
  .reference-popup-content a:hover {
    text-decoration: underline;
  }
  /* Espacio a la derecha del DOI */
  .reference-popup-content span:has(a[color="primary"]) {
    margin-right: 6px;
    display: inline-block;
  }

  /* Tabla estilo Amboss */
  .amboss-table {
    border-left: 1px solid var(--color-divider-primary);
    border-spacing: 0;
    border-top: 1px solid var(--color-divider-primary);
    color: var(--color-text-primary);
    overflow-x: inherit;
    text-align: left;
    border-radius: 4px;
    width: 100%;
    font-size: 0.85em;
    line-height: 1.5em;
    overflow-y: auto;
    border-collapse: separate;
  }

  @media screen and (min-width: 1280px) {
    .amboss-table {
      font-size: 0.95em;
    }
  }

  /* Dark mode support for table */
  .isDarkmodeActive .amboss-table {
    border-top: 1px solid #32363e;
    border-left: 1px solid #32363e;
  }

  .amboss-table th {
    background-color: var(--color-background-secondary);
    border-bottom: 1px solid var(--color-divider-primary);
    border-right: 1px solid var(--color-divider-primary);
    padding: 8px 12px;
    font-weight: bold;
  }

  .isDarkmodeActive .amboss-table th {
    background-color: #1e2125;
    border-bottom: 1px solid #32363e;
    border-right: 1px solid #32363e;
  }

  .amboss-table td {
    border-bottom: 1px solid var(--color-divider-primary);
    border-right: 1px solid var(--color-divider-primary);
    padding: 8px 12px;
    vertical-align: middle;
  }

  .isDarkmodeActive .amboss-table td {
    border-bottom: 1px solid #32363e;
    border-right: 1px solid #32363e;
  }

  .amboss-table td ul,
  .amboss-table td ol {
    margin: 4px 0 0;
    padding: 0;
  }

  .amboss-table td ul li,
  .amboss-table td ol li {
    margin: 0 0 4px 16px;
  }
  .article-h3-divider {
    border-bottom: 1px solid #e0e6eb;
    width: 100%;
    margin-bottom: 8px;
  }
  
  /* Estilos para Referencias (Amboss Style) */
  .reference-item {
    display: flex;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--color-text-primary, #222);
    font-family: var(--font-family-primary);
  }
  .reference-number {
    min-width: 24px;
    margin-right: 4px;
    color: var(--color-text-primary, #222);
  }
  .isDarkmodeActive .reference-item,
  .isDarkmodeActive .reference-number {
    color: #cbd5e1;
  }
  .reference-text {
    flex: 1;
  }
  .reference-link-icon {
    display: inline-flex;
    align-items: center;
    margin-left: 4px;
    color: #047a88;
    vertical-align: middle;
  }
  .reference-link-icon svg {
    width: 14px;
    height: 14px;
  }
  .content-box * {
    text-decoration-color: color-mix(in srgb, currentColor, transparent 40%) !important;
    -webkit-text-decoration-color: color-mix(in srgb, currentColor, transparent 40%) !important;
  }
  sub, sup {
    font-size: .76em;
    line-height: 0;
    position: relative;
    vertical-align: baseline;
  }
  sup {
    top: -0.5em;
  }
  sub {
    bottom: -0.25em;
  }

  /* Badge para ##Consult## */
  .consult-badge {
    background-color: var(--color-background-warningSubtle);
    border: 1px solid var(--color-background-warning) !important;
    color: var(--color-text-secondary) !important;
    padding: 2px 6px !important;
    border-radius: 4px !important;
    font-size: 8px !important;
    font-weight: 800 !important;
    text-transform: uppercase !important;
    display: inline-flex !important;
    align-items: center !important;
    margin: 0 4px !important;
    vertical-align: middle !important;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1) !important;
    letter-spacing: 0.5px !important;
  }

  /* SUBTITULOGUIDE Styles */
  .subtitulo-guide {
    margin: 0 !important;
    padding: 10px 16px !important;
    font-size: 16px !important;
    font-weight: bold !important;
    border-radius: 8px 8px 0 0 !important;
    border: 1px solid transparent;
    display: block !important;
  }
  .subtitulo-guide + .article-h3-divider { display: none; } /* Ocultar divisor para estas cabeceras */

  .guide-azul { 
    background-color: #eef3fe !important; 
    color: #2a4b8d !important; 
    border-color: #ccdbf7 !important;
    border-bottom: none !important;
  }
  .guide-rosa { 
    background-color: #fff1f2 !important; 
    color: #cc3333 !important; 
    border-color: #ffe4e6 !important;
    text-decoration: underline !important;
    border-bottom: none !important;
  }
  .guide-verde { 
    background-color: #e6f7f8 !important; 
    color: #036873 !important; 
    border-color: #c9eded !important;
    border-bottom: none !important;
  }
  .guide-rojo { 
    background-color: #d93025 !important; 
    color: #ffffff !important; 
    border-color: #d93025 !important;
    border-bottom: none !important;
  }

  /* Ajuste de contenedor de lista inmediata o boxgris para que parezca parte del recuadro */
  .subtitulo-guide + ul, .subtitulo-guide + .article-h3-divider + ul,
  .subtitulo-guide + .boxgris {
    border: 1px solid #ccdbf7;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 16px 16px 16px 36px !important;
    margin-top: 0 !important;
    background-color: rgba(255,255,255,0.5);
  }
  .subtitulo-guide + .boxgris { padding: 16px !important; } /* Menos padding lateral para boxes que para listas */
  
  .guide-rosa + ul, .guide-rosa + .boxgris { border: 1px solid #e9ecef; background-color: transparent; }
  .guide-verde + ul, .guide-verde + .boxgris { border: 1px solid #e9ecef; background-color: transparent; }
  .guide-rojo + ul, .guide-rojo + .boxgris { border: 1px solid #e9ecef; background-color: transparent; }
  .guide-azul + ul, .guide-azul + .boxgris { border: 1px solid #e9ecef; background-color: transparent; }
  .boxgris { background-color: #f8f9fa; border: 1px solid #e9ecef; }

  /* Masonry Layout para Article Content (Aproximación vertical) */
  /* Quick guide persistence */
  .quick-guide-accent {
    color: #00848f !important;
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
  }
  .cebd2a302a3552c4--headerContainer.quick-guide-container:not(.cebd2a302a3552c4--headerContainerActive) {
    background-color: var(--color-background-accentSubtle) !important;
  }
  .cebd2a302a3552c4--headerContainer.quick-guide-container:not(.cebd2a302a3552c4--headerContainerActive):hover {
    filter: brightness(0.98) !important;
  }

  .a19c2cb9aca4d5ec--content {
    display: block !important;
    column-count: 2;
    column-gap: 16px;
  }
  .a19c2cb9aca4d5ec--content > * {
    break-inside: avoid;
    margin-bottom: 16px;
    width: 100%;
  }
  /* Elementos que no son recuadros guía ocupan todo el ancho */
  .a19c2cb9aca4d5ec--content > :not(.guide-box-wrapper) {
    column-span: all;
  }
  @media (max-width: 768px) {
    .a19c2cb9aca4d5ec--content { column-count: 1; }
  }
</style>

  <script>
    window.phrasionaryCache = window.phrasionaryCache || {};
    const phrasionaryCache = window.phrasionaryCache;

    async function getPhrasionaryTerm(termId) {
      if (!termId) throw new Error('No termId');

      // Cache en memoria para no pegarle mil veces a Firestore
      if (phrasionaryCache[termId]) return phrasionaryCache[termId];

      const snap = await db.collection('phrasionaryTerms').doc(termId).get();
      if (!snap.exists) {
        throw new Error('Term not found in phrasionaryTerms/' + termId);
      }
      const data = snap.data();
      phrasionaryCache[termId] = data;
      return data;
    }

    // NUEVO: buscar por mainArticle.anchorId sin cambiar el ID del doc
    async function getPhrasionaryTermByAnchor(anchorId) {
      if (!anchorId) throw new Error('No anchorId');

      const cacheKey = 'anchor:' + anchorId;
      if (phrasionaryCache[cacheKey]) return phrasionaryCache[cacheKey];

      const snap = await db
        .collection('phrasionaryTerms')
        .where('mainArticle.anchorId', '==', anchorId)
        .limit(1)
        .get();

      if (snap.empty) {
        throw new Error('Term not found for anchorId ' + anchorId);
      }

      const doc = snap.docs[0];
      const data = doc.data();
      phrasionaryCache[cacheKey] = data;
      return data;
    }

    // Buscar por href EXACTO (lo que tenés guardado en term.article.href)
    async function getPhrasionaryTermByHref(href) {
      if (!href) throw new Error('No href');

      const cacheKey = 'href:' + href;
      if (phrasionaryCache[cacheKey]) return phrasionaryCache[cacheKey];

      const snap = await db
        .collection('phrasionaryTerms')
        .where('article.href', '==', href)
        .limit(1)
        .get();

      if (snap.empty) {
        throw new Error('Term not found for href ' + href);
      }

      const data = snap.docs[0].data();
      phrasionaryCache[cacheKey] = data;
      return data;
    }

    // Buscar por nombre de fármaco en la colección 'farmacos'
    async function getDosageData(drugName) {
      if (!drugName) throw new Error('No drugName');
      
      const cleanName = drugName.trim()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\w\s:\-\(\)]/g, "")
        .replace(/\//g, "-")
        .replace(/\s+/g, " ").trim();
        
      if (!cleanName) throw new Error('Invalid drug name after cleaning');

      const cacheKey = 'dosage:' + cleanName;
      if (phrasionaryCache[cacheKey]) return phrasionaryCache[cacheKey];

      // 1) Intentar por docId (ID seguro generado)
      let snap = await db.collection('farmacos').doc(cleanName).get();
      if (snap.exists) {
        phrasionaryCache[cacheKey] = snap.data();
        return snap.data();
      }

      // 2) Fallback: buscar por campo 'drugName' (más robusto que título con prefijos)
      snap = await db.collection('farmacos').where('drugName', '==', cleanName).limit(1).get();
      if (!snap.empty) {
        const data = snap.docs[0].data();
        phrasionaryCache[cacheKey] = data;
        return data;
      }

      throw new Error('Dosage info not found for: ' + cleanName);
    }

      // ✨ NEW: Helper functions for sequential field parsing and HTML generation

      /**
       * Parse field name to extract base name and sequential number
       * e.g., "LISTA1_001" → {base: "LISTA1", num: 1}
       */
      function parseFieldName(fieldName) {
        const match = fieldName.match(/^([A-Za-záéíóúÁÉÍÓÚñÑ][A-Za-záéíóúÁÉÍÓÚñÑ0-9_]*)_(\d{3})$/);
        if (match) return { base: match[1], num: parseInt(match[2], 10) };
        return null;
      }

      /**
       * Group fields by base name and sort by number
       * Returns: { "LISTA1": [{key, value, num}, ...], ... }
       */
      function groupFieldsByBase(data) {
        const groups = {};
        Object.keys(data).forEach(key => {
          const parsed = parseFieldName(key);
          if (parsed) {
            if (!groups[parsed.base]) groups[parsed.base] = [];
            groups[parsed.base].push({ key, value: data[key], num: parsed.num });
          }
        });
        
        // Sort each group by number
        Object.keys(groups).forEach(base => {
          groups[base].sort((a, b) => a.num - b.num);
        });
        
        return groups;
      }

      /**
       * Check if data has sequential fields (new format)
       */
      function hasSequentialFields(data) {
        return Object.keys(data).some(key => {
          const parsed = parseFieldName(key);
          return parsed && (['LISTA1B', 'LISTA1', 'SUBTITULO'].includes(parsed.base) || parsed.base.startsWith('contenido'));
        });
      }

      /**
       * Process inline markup: **bold** → <strong>
       * Preserves existing HTML tags
       */
      function processInlineMarkup(text, data = null) {
        if (typeof text !== 'string') return text;
        return text
          .replace(/\*\*(.*?)\*\*/g, '<strong class="leitwort">$1</strong>')
          .replace(/##(.*?)##/g, '<span class="consult-badge">$1</span>')
          .replace(/__(.*?)__/g, (_, text) => {
            const match = text.match(/^(.*?)\s*\|\s*(Z[\w-]+)\s*$/);
            const visibleText = (match ? match[1] : text).trim();
            const anchorAttr = match ? ` data-anker="${match[2]}"` : '';
            return `<span class="api tooltip__link"${anchorAttr} style="text-underline-offset: 1px; text-decoration-line: underline; text-decoration-thickness: 1px; cursor: pointer;">${visibleText}</span>`;
          })
          .replace(/::(.*?)\s*\|\s*id:(Z[\w-]+)\s*::/g, '<span class="api" data-type="anker" id="$2">$1</span>')
          .replace(/\^\^(.*?)\^\^/g, (_, text) => {
            const match = text.match(/^(.*?)\s*\|\s*(Z[\w-]+)\s*$/);
            const visibleText = (match ? match[1] : text).trim();
            const anchorAttr = match ? ` data-anker="${match[2]}"` : '';
            return `<span class="api link--same-article"${anchorAttr} style="text-underline-offset: 2px; -webkit-text-decoration-line: underline; -webkit-text-decoration-style: dotted; text-decoration-line: underline; text-decoration-style: dotted; text-decoration-thickness: 2px; cursor: pointer;">${visibleText}</span>`;
          })
          .replace(/\((message(\d+))(?:\/id:([A-Za-z0-9_-]+))?\)/g, (match, full, num, explicitId) => {
            const pattern = new RegExp(`^message${num}_`);
            const mKey = Object.keys(data || {}).find(k => pattern.test(k));
            const msgId = explicitId || (mKey ? data[mKey] : '');
            return `<span class="api explanation" data-type="bonus" id="${msgId}"><span class="inline-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16"><g stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 2a1 1 0 0 0-1 1v3.222L1.638 7.67c-.091.097-.236.17-.255.3a.2.2 0 0 0 0 .06c.02.13.164.203.255.3L3 9.778V13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"></path><path stroke-linecap="square" stroke-linejoin="bevel" d="M7 6h4m-4 4h4"></path></g></svg></span></span>`;
          })
          .replace(/\((gallery(\d+))([^)]*)\)/g, (match, full, num, idsStr) => {
            const pattern = new RegExp(`^gallery${num}_`);
            const gKey = Object.keys(data || {}).find(k => pattern.test(k));
            const galId = gKey ? data[gKey] : '';
            const imgIds = idsStr ? [...idsStr.matchAll(/id\s+([^\s/]+)/g)].map(m => m[1]).join(',') : '';
            const imgIdsAttr = imgIds ? ` data-img-ids="${imgIds}"` : '';

      /**

       */
      function renderFieldAsHTML(baseType, value, data = null, id = '', link = null, imageId = null, imageTitle = null) {
        if (!value || value === '') return '';
        
        const processedValue = processInlineMarkup(value, data);
        const idAttr = id ? ` id="${id}"` : '';
        
        switch(baseType) {
          case 'titulocentral':
            return `<h1 class="_62af53fea5b31646--headerTitle"${idAttr}>${processedValue}</h1>`;
            
          case 'SUBTITULO':

          case 'SUBTITULOGUIDEazul':

          case 'SUBTITULOGUIDErosa':

          case 'SUBTITULOGUIDEverde':
            return `<h3 class="subtitulo-guide guide-verde"${idAttr}>${processedValue}</h3>`;
          case 'SUBTITULOGUIDErojo':
            return `<h3 class="subtitulo-guide guide-rojo"${idAttr}>${processedValue}</h3>`;
            
          case 'contenido1':
          case 'contenido2':
          case 'contenido3':
          case 'contenido4':
          case 'contenido5':
          case 'contenido6':
          case 'contenido7':
          case 'contenido8':
          case 'contenido9':
          case 'contenido10':
            return `<p class="paragraph"${idAttr}>${processedValue}</p>`;
            
          case 'LISTA1B':
            // Checkbox list item (Amboss style)
            // Note: applyDynamicStyling will handle the checkbox styling and wrapping
            return `
              <label class="checkbox-list" style="display: flex;"${idAttr}>
                <input type="checkbox" name="learned-checkbox" style="display: none;">
                <div style="flex: 1;">${processedValue}</div>
              </label>`;
            
          case 'LISTA1':
            return `<li style="margin-left: 0px;"${idAttr}>${processedValue}</li>`;
            
          case 'LISTA2':
            return `<li style="margin-left: 30px; list-style-type: circle;"${idAttr}>${processedValue}</li>`;
            
          case 'LISTA3':
            return `<li style="margin-left: 60px; list-style-type: square;"${idAttr}>${processedValue}</li>`;
            
          case 'boxverde':
            return `<div class="content-box merke green" style="padding: 16px; margin: 16px 0;"${idAttr}>${processedValue}</div>`;
          case 'boxverdemedical':
            return `<div class="content-box merke green clinic-box" style="padding: 16px; margin: 16px 0;"${idAttr}><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32"><path fill="currentColor" fill-rule="evenodd" d="M5 4a1 1 0 0 1 1-1h2.625a1 1 0 0 1 0 2H7v5.429C7 14.809 9.866 18 13 18s6-3.191 6-7.571V5h-1.625a1 1 0 1 1 0-2H20a1 1 0 0 1 1 1v6.429c0 4.71-2.917 8.904-7 9.499v4.93C14 27.11 15.906 29 18.333 29s4.334-1.889 4.334-4.143q0-.083.013-.162a3 3 0 1 1 1.986.23C24.628 28.32 21.773 31 18.333 31 14.87 31 12 28.284 12 24.857v-4.93c-4.083-.594-7-4.787-7-9.498zm20 18a1 1 0 1 1-2 0 1 1 0 0 1 2 0" clip-rule="evenodd"></path></svg></span>${processedValue}</div>`;
          case 'boxrojo':
            return `<div class="content-box cave red" style="padding: 16px; margin: 16px 0;"${idAttr}>${processedValue}</div>`;
          case 'boxazul':
            return `<div class="content-box merkspruch blue" style="padding: 16px; margin: 16px 0;"${idAttr}>${processedValue}</div>`;
          case 'boxgris':
            return `<div class="content-box boxgris" style="padding: 16px; margin: 16px 0;"${idAttr}>${processedValue}</div>`;
            
          default:
            // Handle image/video links
            if ((baseType.startsWith('imagen') || baseType.startsWith('video')) && baseType.includes('link')) {
              const type = baseType.startsWith('video') ? 'video' : 'image';
              const imgIdAttr = imageId ? ` data-${type}-id="${imageId}"` : '';
              const titleAttr = imageTitle ? ` title="${imageTitle.replace(/"/g, '&quot;')}"` : '';
              const backdrop = type === 'video' ? '<span class="thumbnail__video__backdrop" style="position: absolute; top: 80px; left: 4px; width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; background: #32465a; border-radius: 4px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M7.042 4.245a2 2 0 0 1 2.04.073l9.333 6a2 2 0 0 1 0 3.364l-9.333 6A2 2 0 0 1 6 18V6a2 2 0 0 1 1.042-1.755"/></svg></span>' : '';
              const caption = imageTitle ? `<span style="font-size: 12px; margin-top: 4px; text-align: left; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; width: 110px; hyphens: auto; overflow-wrap: anywhere;">${imageTitle}</span>` : '';
              const videoUrl = link || value;
              const displaySrc = value.replace(/^.*(?:\/file\/d\/|id=)([^\/&?]+).*$/, 'https://drive.google.com/thumbnail?id=$1&sz=w1000');
              return `<span data-type="${type}" class="thumbnail__${type}" style="display: inline-flex; position: relative; width: 110px; height: auto; margin: 8px; cursor: pointer; flex-direction: column; align-items: flex-start; vertical-align: top;"${idAttr}${imgIdAttr}>

                ${backdrop}
                ${caption}
              </span>`;
            }
            
            // Handle image captions
            if (baseType.startsWith('textoimagen')) {
              return `<span style="font-size: 12px; margin-top: 4px;"${idAttr}>${value}</span>`;
            }
            
            // Handle references
            if (baseType.startsWith('ref')) {
               // Evitar duplicados si es un campo de link (se integrará en la cita si es posible, 
               // pero por ahora solo nos enfocamos en que la cita se vea bien)
               if (baseType.includes('link')) return '';

               const refNum = baseType.match(/ref(\d+)/)?.[1] || baseType.replace(/\D/g, '');
               let text = processInlineMarkup(value, data);
               
               // Icono de enlace externo (Amboss style)
               const externalIcon = `
                 <span class="reference-link-icon">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                     <path d="M13 9v2.667c0 .736-.597 1.333-1.333 1.333H4.333A1.333 1.333 0 0 1 3 11.667V4.333C3 3.597 3.597 3 4.333 3H7"></path>
                     <path d="M10 2h4v4M8 8l6-6"></path>
                   </svg>
                 </span>`;

               // Si el texto contiene DOI o URL, añadir icono (pero solo si no lo tiene ya procesado)
               if ((text.toLowerCase().includes('doi:') || text.toLowerCase().includes('http')) && !text.includes('reference-link-icon')) {
                  // Si tenemos un link explícito (extra), envolver el DOI/URL
                  if (link) {
                     const doiPattern = /(10\.\d{4,}\/[-._;()/:a-zA-Z0-9]+|https?:\/\/[^\s<]+)/g;
                     text = text.replace(doiPattern, `<a href="${link}" target="_blank" style="color: inherit; text-decoration: underline;">$1</a>`);
                  }
                  
                  // Si hay un enlace <a>, meter el icono dentro o al lado
                  if (text.includes('</a>')) {
                     text = text.replace('</a>', ` ${externalIcon}</a>`);
                  } else {
                     text += ` ${externalIcon}`;
                  }
               }

               return `
                 <div class="reference-item" id="ref${refNum}"${idAttr}>
                   <div class="reference-number">${refNum}.</div>
                   <div class="reference-text">${text}</div>
                 </div>`;
            }
            
            return '';
        }
      }

      /**
       * Render table from tabla_* fields
       */
      function renderTableFromFields(data, suffix = '') {
        const totalRowsKey = 'tabla_totalfilas' + suffix;
        if (!data[totalRowsKey]) return '';
        
        const totalRows = parseInt(data[totalRowsKey], 10);
        if (isNaN(totalRows) || totalRows === 0) return '';
        
        let tableHTML = '<table class="amboss-table" style="margin: 16px 0;">';
        
        for (let r = 1; r <= totalRows; r++) {
          tableHTML += '<tr>';
          let c = 1;
          
          while (true) {
            // Build base prefix for the cell: e.g. tabla_f1_c1
            const cellPrefix = `tabla_f${r}_c${c}`;
            
            // Check if either the direct key or the first sequential key exists
            const directKey = cellPrefix + suffix;
            const firstSeqKey = cellPrefix + '_001' + suffix;
            
            if (data[directKey] === undefined && data[firstSeqKey] === undefined && 
                data[cellPrefix + '_colspan' + suffix] === undefined && 
                data[cellPrefix + '_header' + suffix] === undefined &&
                data[cellPrefix + '_rowspan' + suffix] === undefined) break;

            const colspan = data[`${cellPrefix}_colspan${suffix}`] || 1;
            const rowspan = data[`${cellPrefix}_rowspan${suffix}`] || 1;
            const isHeader = data[`${cellPrefix}_header${suffix}`] || false;
            const tag = isHeader ? 'th' : 'td';
            
            let cellContent = '';
            if (data[directKey] !== undefined) {
              cellContent = processInlineMarkup(data[directKey], data);
            } else {
              // Gather all sequential items: _001, _002...
              let idx = 1;
              let items = [];
              while (data[`${cellPrefix}_${idx.toString().padStart(3, '0')}${suffix}`] !== undefined) {
                items.push(processInlineMarkup(data[`${cellPrefix}_${idx.toString().padStart(3, '0')}${suffix}`], data));
                idx++;
              }
              cellContent = items.join('');
              if (cellContent.includes('<li')) {
                cellContent = `<ul style="list-style-type: disc; padding-left: 20px; margin: 0;">${cellContent}</ul>`;
              }
            }
            
            tableHTML += `<${tag}${colspan > 1 ? ` colspan="${colspan}"` : ''}${rowspan > 1 ? ` rowspan="${rowspan}"` : ''}>${cellContent}</${tag}>`;
            c++;
          }
          tableHTML += '</tr>';
        }
        
        tableHTML += '</table>';
        return tableHTML;
      }

      /**
       * Generate complete HTML from grouped sequential fields
       */
      function generateHTMLFromFields(data, sectionData = null, idPrefix = '') {
        const groups = groupFieldsByBase(data);
        
        // Reunir todos los items secuenciales y ordenarlos por su sufijo numérico
        const allItems = [];
        Object.keys(groups).forEach(base => {
          groups[base].forEach(item => {
            allItems.push({ ...item, base });
          });
        });
        // Ordenar estrictamente por el número que define su posición en el texto original
        allItems.sort((a,b) => a.num - b.num);

        let html = '';
        
        // Track if we're in a list to wrap with <ul>
        let inList = false;
        let inImageGroup = false;
        let currentListType = null;
        const processedTables = new Set();
        
        // Helper to close list if needed
        const closeListIfOpen = () => {
          if (inList) {
            html += '</ul>';
            inList = false;
            currentListType = null;
          }
        };

        const closeImageGroupIfOpen = () => {
          if (inImageGroup) {
            html += '</div>';
            inImageGroup = false;
          }
        };

        let inGuideBox = false;
        const closeGuideBoxIfOpen = () => {
          if (inGuideBox) {
            html += '</div>';
            inGuideBox = false;
          }
        };
        
        allItems.forEach(item => {
          const baseName = item.base;
          
          // Especial: Referencias se manejan al final (opcional, si queremos mantenerlas al final)
          // Si el usuario quiere orden estricto, las referencias aparecerán donde se definan.
          if (baseName.startsWith('ref') || baseName.startsWith('textoimagen')) return; 

          // Check if this is a guide header
          if (baseName.startsWith('SUBTITULOGUIDE')) {
            closeListIfOpen();
            closeImageGroupIfOpen();
            closeGuideBoxIfOpen();
            html += '<div class="guide-box-wrapper">';
            inGuideBox = true;
          }

          // Check if this is a list type
          const isListType = ['LISTA1', 'LISTA2', 'LISTA3', 'LISTA1B', 'LISTA1_TABLA', 'LISTA2_TABLA'].some(l => baseName.includes(l));
          
          if (isListType) {
            // Start list if not already in one
            if (!inList) {
              closeImageGroupIfOpen();
              html += '<ul style="list-style-type: disc; padding-left: 20px;">';
              inList = true;
            }
          } else {
            // Check for image grouping
            const isImageItem = baseName.startsWith('imagen') || baseName.startsWith('textoimagen') || baseName.startsWith('video');
            if (isImageItem) {
               if (!inImageGroup) {
                  closeListIfOpen();
                  closeGuideBoxIfOpen();
                  html += '<div style="display: flex; flex-wrap: wrap; gap: 4px; margin: 16px 0;">';
                  inImageGroup = true;
               }
            } else if (!baseName.startsWith('SUBTITULOGUIDE') && baseName !== 'boxgris') {
               // Close everything if it's a regular element or table (but not if it just started a guide box or is internal)
               closeListIfOpen();
               closeImageGroupIfOpen();
               closeGuideBoxIfOpen();
            }
          }

          if (baseName.startsWith('tabla_')) {
             if (!processedTables.has(item.num)) {
                html += renderTableFromFields(data, '_' + String(item.num).padStart(3, '0'));
                processedTables.add(item.num);
             }
          } else {
              // ✅ Para imagenNlink o videoNlink, pasar el ID real y el texto (para mediavisor)
              let imageId = null;
              let imageTitle = null;
              const isImage = baseName.match(/^imagen\d+link$/);
              const isVideo = baseName.match(/^video\d+link$/);
              
              if (isImage || isVideo) {
                const prefix = isImage ? 'imagen' : 'video';
                const idBase = baseName.replace('link', 'id');
                const textBase = baseName.replace(new RegExp(`^${prefix}(\\d+)link`), `texto${prefix}$1`);
                const thumbBase = baseName.replace('link', 'thumb');
                const smallBase = baseName.replace('link', 'small');
                
                imageId = groups[idBase]?.[0]?.value || null;
                imageTitle = groups[textBase]?.[0]?.value || null;
                
                // Si hay un thumb o small explícito, lo usamos como fuente de la imagen (src)
                // pero pasamos el link original como parámetro adicional (para miamed-video o visualización big)
                const thumbValue = groups[thumbBase]?.[0]?.value || groups[smallBase]?.[0]?.value;
                if (thumbValue) {
                  html += renderFieldAsHTML(baseName, thumbValue, data, idPrefix + item.key, item.value, imageId, imageTitle);
                  return;
                }
              }
              html += renderFieldAsHTML(baseName, item.value, data, idPrefix + item.key, null, imageId, imageTitle);
          }
        });
        
        // Close groups if still open at the end
        closeListIfOpen();
        closeImageGroupIfOpen();
        closeGuideBoxIfOpen();

        // Dynamic References Section
        const refKeys = Object.keys(groups).filter(k => k.startsWith('ref') && !k.includes('link'));
        if (refKeys.length > 0) {
            // Sort numerically
            refKeys.sort((a,b) => {
                const na = parseInt(a.replace(/\D/g, ''), 10);
                const nb = parseInt(b.replace(/\D/g, ''), 10);
                return na - nb;
            });
            
            html += '<div style="margin-top: 2px; padding-top: 2px;">';
            
            refKeys.forEach(baseName => {
                 groups[baseName].forEach(item => {
                      const linkBase = baseName.replace('cita', 'link');
                      const linkItem = groups[linkBase] ? groups[linkBase][0] : null;
                       html += renderFieldAsHTML(baseName, item.value, data, idPrefix + item.key, linkItem ? linkItem.value : null);
                 });
            });
            html += '</div>';
        }
        
        return html;
      }

      // ═══════════════════════════════════════════════════════════════════
      // End of sequential field helpers

      function toggleSection(sectionId) {
        const contentContainer = document.querySelector(
          `[data-section-content="${sectionId}"]`
        );
        const headerContainer = document.querySelector(
          `[data-section-header="${sectionId}"]`
        );

        if (!contentContainer) return;

        const isExpanded = contentContainer.style.display !== "none";
        const iconPath = headerContainer.querySelector(
          ".css-2vq6ya-StyledIcon svg path"
        );
        const titleElement = headerContainer.querySelector(
          "[data-section-title]"
        );

        if (isExpanded) {
          // Collapse section
          contentContainer.style.display = "none";
          headerContainer.classList.remove(
            "cebd2a302a3552c4--headerContainerActive"
          );
          contentContainer.classList.remove(
            "cebd2a302a3552c4--contentContainerActive"
          );
          // Set icon to point down
          if (iconPath) iconPath.setAttribute("d", "m6 9 6 6 6-6");
          // Change h3 to h4
          if (titleElement && titleElement.tagName === "H3") {
            const newTitle = document.createElement("h4");
            newTitle.className = titleElement.className;
            newTitle.setAttribute("data-section-title", sectionId);
            newTitle.innerHTML = titleElement.innerHTML;
            titleElement.parentNode.replaceChild(newTitle, titleElement);
          }
        } else {
          // Expand section
          contentContainer.style.display = "block";
          headerContainer.classList.add(
            "cebd2a302a3552c4--headerContainerActive"
          );
          contentContainer.classList.add(
            "cebd2a302a3552c4--contentContainerActive"
          );
          // Set icon to point up
          if (iconPath) iconPath.setAttribute("d", "m18 15-6-6-6 6");
          // Change h4 to h3
          if (titleElement && titleElement.tagName === "H4") {
            const newTitle = document.createElement("h3");
            newTitle.className = titleElement.className;
            newTitle.setAttribute("data-section-title", sectionId);
            newTitle.innerHTML = titleElement.innerHTML;
            titleElement.parentNode.replaceChild(newTitle, titleElement);
          }

          // Load content if not already loaded
          if (!loadedSections.has(sectionId)) {
            loadSectionContent(sectionId, contentContainer);
          }
        }
      }

      function loadSectionContent(sectionId, contentContainer) {
        // ✅ Ultra-short fix: if content is already there (sequential format), just return
        if (articleData && articleData.secciones) {
          loadedSections.add(sectionId);
          return;
        }

        if (
          !articleData ||
          !articleData.sections ||
          !articleData.sections[sectionId]
        ) {
          const baseEl = contentContainer.querySelector(".a19c2cb9aca4d5ec--baseStyles");
          if (baseEl) baseEl.innerHTML = '<p style="color:red">Section content not found.</p>';
          return;
        }

        const sectionContent = articleData.sections[sectionId].html;
  const baseEl = contentContainer.querySelector(
    ".a19c2cb9aca4d5ec--baseStyles"
  );
  if (!baseEl) return; // ✅ Ultra-short fix: skip if already rendered or structure mismatch
  
  // Renderizado recursivo: Suporta Monolítico (string), Arrays, y Mapas (objetos con claves 01_Nombre)
  const renderItem = (item) => {
    if (!item) return '';
    if (typeof item === 'string') return item === 'no-condensed' ? '' : item;
    
    if (Array.isArray(item)) {
      return item.map(renderItem).join('');
    }
    
    if (typeof item === 'object') {
      // Caso: Tabla estructurada
      if (item.type === 'table' && item.rows) {
        let tableHtml = '<table class="amboss-table">';
        const rowKeys = Object.keys(item.rows).sort();
        rowKeys.forEach(rKey => {
          tableHtml += '<tr>';
          const rowData = item.rows[rKey];
          const cellKeys = Object.keys(rowData).sort();
          cellKeys.forEach(cKey => {
            const tag = cKey.split('_')[1] || 'td';
            const cellData = rowData[cKey];
            
            // Reconstruir atributos si existen
            let attrs = '';
            let content = cellData;
            
            if (cellData && typeof cellData === 'object' && cellData.content !== undefined) {
              content = cellData.content;
              if (cellData.rowspan) attrs += ` rowspan="${cellData.rowspan}"`;
              if (cellData.colspan) attrs += ` colspan="${cellData.colspan}"`;
              if (cellData.class) attrs += ` class="${cellData.class}"`;
            }
            
            tableHtml += `<${tag}${attrs}>${renderItem(content)}</${tag}>`;
          });
          tableHtml += '</tr>';
        });
        tableHtml += '</table>';
        return tableHtml;
      }

      // Si es un bloque de Firestore { blocks: [...] }
      if (item.blocks) return renderItem(item.blocks);
      // Si es un contenido completo { html: [...] } (legacy)

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const margin = 8;

        const popupRect = popup.getBoundingClientRect();
        const spaceBelow = vh - rect.bottom;
        const spaceAbove = rect.top;

        let placeAbove = false;
        if (spaceBelow < popupRect.height + margin && spaceAbove > spaceBelow) {
          placeAbove = true;
        }

        let top;
        if (placeAbove) {
          top = rect.top - popupRect.height - 8;
          if (top < margin) top = margin;
        } else {
          top = rect.bottom + 8;
          if (top + popupRect.height > vh - margin) {
            top = vh - margin - popupRect.height;
          }
        }

        let left = rect.left + rect.width / 2 - popupRect.width / 2;
        left = Math.max(margin, Math.min(left, vw - popupRect.width - margin));

        popup.style.top = `${top}px`;
        popup.style.left = `${left}px`;

        const anchorX = rect.left + rect.width / 2;
        let arrowX = anchorX - left;

        const half = 9;
        const pad = 6;

        arrowX = Math.max(half + pad, Math.min(arrowX, popupRect.width - half - pad));

        arrowBorder.style.left = `${arrowX}px`;
        arrow.style.left = `${arrowX}px`;

        if (placeAbove) {

<script>
(function () {
  if (document.getElementById('font-size-popover')) return;
  // ========= CONFIG =========
  const TRIGGER_SEL = 'button[aria-label="Change font size"]';
  const MIN = 0.80;
  const MAX = 1.15;
  const STEP = 0.05;
  const DEFAULT = 1.00;

  const TARGET_ROOT = document.documentElement;
  const STORAGE_KEY = 'bancomicina_library_fontScale';

  let isOpen = false;
  let currentTrigger = null;

  function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

  function getScale() {
    const saved = Number(localStorage.getItem(STORAGE_KEY));
    if (Number.isFinite(saved) && saved > 0) return clamp(saved, MIN, MAX);
    const fromCss = Number(TARGET_ROOT.style.getPropertyValue('--banco-font-scale'));
    if (Number.isFinite(fromCss) && fromCss > 0) return clamp(fromCss, MIN, MAX);
    return DEFAULT;
  }

  function setScale(v) {
    const scale = clamp(Number(v), MIN, MAX);
    TARGET_ROOT.style.setProperty('--lib-font-scale', String(scale));
    localStorage.setItem(STORAGE_KEY, String(scale));
    updateUI(scale);
    
    if (isOpen && currentTrigger) {
      requestAnimationFrame(() => {
        positionPopover(currentTrigger);
      });
    }
  }

  // ========= INJECT CSS =========
  const style = document.createElement('style');
  style.textContent = `
    :root { --lib-font-scale: ${DEFAULT}; }

    /* Apply scale ONLY to container to let children inherit without compounding */
    .a2e0dbc7f6affd28--baseStyles {
      font-size: calc(1em * var(--lib-font-scale));
    }

    .a2e0dbc7f6affd28--baseStyles h1 {
      /* Use 1.828em relative to the container, which is already scaled */
      font-size: 1.828em;
    }

    .a2e0dbc7f6affd28--baseStyles h3 {
      font-size: calc(1.375em * var(--lib-font-scale));
    }

    .a2e0dbc7f6affd28--baseStyles h4 {
      font-size: calc(1.05em * var(--lib-font-scale));
    }

    ._62af53fea5b31646--synonymText {
      font-size: calc(1.2em * (1 + (var(--lib-font-scale) - 1) * 0.4)) !important;
    }



    

    #font-size-popover{
      position: fixed;
      z-index: 20050;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
      width: 112px;
      height: 48px;
      padding: 8px;
      box-sizing: border-box;
      /* ✅ Sin transición al abrir para evitar glitch */
      transition: none;
      /* ✅ Oculto e invisible inicialmente */
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ✅ Estado visible */
    #font-size-popover.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      /* ✅ Transición suave SOLO cuando ya está visible */
      transition: top 0.15s ease, left 0.15s ease;
    }

    #font-size-popover .banco-font-controls{
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
    }

    #font-size-popover .banco-font-btn{
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #0f172a;
      transition: all 0.2s ease;
    }

    #font-size-popover .banco-font-btn:hover:not([disabled]){
      background: rgba(15, 23, 42, 0.06);
    }

    #font-size-popover .banco-font-btn:active:not([disabled]){
      background: rgba(15, 23, 42, 0.10);
    }

    #font-size-popover .banco-font-btn[disabled]{
      cursor: not-allowed;
      opacity: 0.4;
      pointer-events: none;
    }

    #font-size-popover .banco-font-btn[disabled] svg path[stroke]{
      stroke: #9ca3af;
    }

    #font-size-popover .banco-font-btn[disabled] svg path[fill]{
      fill: #9ca3af;
    }

    #font-size-popover .banco-font-btn:not([disabled]) svg path[stroke]{
      stroke: #0f172a;
      transition: stroke 0.2s ease;
    }

    #font-size-popover .banco-font-btn:not([disabled]):hover svg path[stroke]{
      stroke: #2563eb;
    }

    #font-size-popover .banco-font-btn:not([disabled]) svg path[fill]{
      fill: #1f2937;
      transition: fill 0.2s ease;
    }

    #font-size-popover .banco-font-btn:not([disabled]):hover svg path[fill]{
      fill: #2563eb;
    }

    #font-size-popover [data-e2e-test-id="font-size-popover_arrow"]{ 
      display: none !important; 
    }
  `;
  document.head.appendChild(style);

  // ========= CREATE POPOVER =========
  const popover = document.createElement('div');
  popover.setAttribute('data-ds-id', 'Popover');
  popover.id = 'font-size-popover';
  popover.setAttribute('aria-hidden', 'true');

  popover.innerHTML = `
    <div class="banco-font-controls">
      <button
        data-e2e-test-id="decrease-font-size-button"
        type="button"
        aria-label="Decrease font size"
        class="banco-font-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" fill="none" viewBox="0 0 16 16" aria-hidden="true">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="2" d="M4 8h8"></path>
        </svg>
      </button>

      <button
        data-e2e-test-id="reset-font-size-button"
        type="button"
        aria-label="Reset font size"
        class="banco-font-btn"
        disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 16 16">
          <path fill="currentColor" fill-rule="evenodd"
            d="M8.372 13h-2.81l-.596-1.6H2.293L1.697 13H0l2.885-7.75h1.488l2.32 6.231L10.063 3h1.967L16 13h-2.282l-.848-2.134H9.22zM3.63 7.81 4.47 10H2.79zM12.15 9l-1.105-2.73L9.92 9z"
            clip-rule="evenodd">
          </path>
        </svg>
      </button>

      <button
        data-e2e-test-id="increase-font-size-button"
        type="button"
        aria-label="Increase font size"
        class="banco-font-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" fill="none" viewBox="0 0 16 16" aria-hidden="true">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="bevel" stroke-width="2" d="M4 8h8M8 4v8"></path>
        </svg>
      </button>
    </div>
  `;
  document.body.appendChild(popover);

  function updateUI(scale) {
    const decreaseBtn = popover.querySelector('[data-e2e-test-id="decrease-font-size-button"]');
    const increaseBtn = popover.querySelector('[data-e2e-test-id="increase-font-size-button"]');
    const resetBtn = popover.querySelector('[data-e2e-test-id="reset-font-size-button"]');

    if (decreaseBtn) decreaseBtn.disabled = (scale <= MIN);
    if (increaseBtn) increaseBtn.disabled = (scale >= MAX);
    if (resetBtn) {
      const isDefault = Math.abs(scale - DEFAULT) < 0.0001;
      resetBtn.disabled = isDefault;
    }
  }

  function positionPopover(triggerEl) {
    if (!triggerEl) return;
    
    const r = triggerEl.getBoundingClientRect();
    const margin = 8;
    const pr = popover.getBoundingClientRect();
    const width = pr.width;

    const top = r.bottom + 10;
    let left = (r.left + r.width / 2) - (width / 2);

    left = Math.max(margin, Math.min(left, window.innerWidth - width - margin));

    popover.style.top = `${Math.round(top)}px`;
    popover.style.left = `${Math.round(left)}px`;
  }

  function open(triggerEl) {
    if (!triggerEl) return;
    currentTrigger = triggerEl;
    
    // ✅ 1. Posicionar mientras está invisible
    positionPopover(triggerEl);
    
    // ✅ 2. Esperar 1 frame para que el posicionamiento se aplique
    requestAnimationFrame(() => {
      // ✅ 3. Hacer visible con fade-in suave
      popover.classList.add('is-visible');
      popover.setAttribute('aria-hidden', 'false');
      isOpen = true;
    });
  }

  function close() {
    popover.classList.remove('is-visible');
    popover.setAttribute('aria-hidden', 'true');
    isOpen = false;
    currentTrigger = null;
  }

  function toggle(triggerEl) {
    if (isOpen) close();
    else open(triggerEl);
  }

  // ========= EVENTS =========
  document.addEventListener('click', function (e) {
    // Only handle clicks on the Library font size button (inside .c64ffd7459a27da8--itemWrapper)
    const trigger = e.target.closest('.c64ffd7459a27da8--itemWrapper button[aria-label="Change font size"]');
    if (trigger) {
      e.preventDefault();
      e.stopPropagation();
      toggle(trigger);
      return;
    }
    if (isOpen && !e.target.closest('#font-size-popover')) close();
  }, true);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && isOpen) close();
  });

  popover.addEventListener('click', function (e) {
    const dec = e.target.closest('[data-e2e-test-id="decrease-font-size-button"]');
    const inc = e.target.closest('[data-e2e-test-id="increase-font-size-button"]');
    const rst = e.target.closest('[data-e2e-test-id="reset-font-size-button"]');

    if (dec && !dec.disabled) { 
      e.preventDefault(); 
      setScale(getScale() - STEP); 
    }
    if (inc && !inc.disabled) { 
      e.preventDefault(); 
      setScale(getScale() + STEP); 
    }
    if (rst && !rst.disabled) { 
      e.preventDefault(); 
      setScale(DEFAULT); 
    }
  });

  window.addEventListener('resize', function () {
    if (!isOpen || !currentTrigger) return;
    positionPopover(currentTrigger);
  }, { passive: true });

  window.addEventListener('scroll', function () {
    if (!isOpen || !currentTrigger) return;
    positionPopover(currentTrigger);
  }, { passive: true, capture: true });

  // ========= INIT =========
  updateUI(getScale());
  setScale(getScale());
})();
</script>












  <script>
  (function() {
    const b = document.getElementById('sticky-breadcrumbs');
    if (!b) return;
    const main = document.getElementById('bc-main');
    const sub = document.getElementById('bc-sub');
    const arr = document.getElementById('bc-arrow');
    const cnt = document.getElementById('bc-sub-container');
    const scroller = window.parent.document.getElementById('main-content') || window;

    const updateBC = () => {
      const st = (scroller === window) ? window.scrollY : scroller.scrollTop;
      const show = st > 180;
      
      if (show) {
        b.style.opacity = '1';
        b.style.zIndex = '1000';
        b.style.visibility = 'visible';
        b.style.pointerEvents = 'auto';
        b.classList.add('f9cf365808f534a0--breadcrumbsContainerVisible');
      } else {
        b.style.opacity = '0';
        b.style.zIndex = '-1';
        b.style.visibility = 'hidden';
        b.style.pointerEvents = 'none';
        b.classList.remove('f9cf365808f534a0--breadcrumbsContainerVisible');
      }
      
      if(show) {
        const h1 = document.getElementById('article-title');
        if(h1 && main) main.textContent = h1.textContent;
        let activeSec = null;
        document.querySelectorAll('[data-section-id]').forEach(s => {
          const rect = s.getBoundingClientRect();
          if(rect.top < 150 && rect.bottom > 150) {
            activeSec = s.querySelector('[data-section-title]')?.textContent;
          }
        });
        if(activeSec && sub) {
          sub.textContent = activeSec;
          arr.style.display = cnt.style.display = 'block';
        } else {
          arr.style.display = cnt.style.display = 'none';
        }
      }
    };
    scroller.addEventListener('scroll', updateBC, { passive: true });
    // Initial check
    setTimeout(updateBC, 500);


  })();
  </script>
