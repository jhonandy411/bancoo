<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Firestore Uploader</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root {
            --primary: #0071e3;
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --card-bg: rgba(255, 255, 255, 0.8);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            backdrop-filter: blur(20px);
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #0071e3, #42a5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #86868b;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        textarea {
            height: 300px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0077ed;
            transform: scale(1.01);
        }
        button:active {
            transform: scale(0.98);
        }
        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        .loading { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Firestore Quick Uploader</h1>
        
        <div class="input-group">
            <label>Dirección de destino (colección/documento)</label>
            <input type="text" id="targetPath" placeholder="articulos_contenido/nombre_doc" value="articulos_contenido/">
        </div>

        <div class="input-group">
            <label>Contenido Plain Text (ETIQUETA: contenido)</label>
            <textarea id="plainText" placeholder="TITULO: Mi Título&#10;SUBTITULO: Mi Subtítulo&#10;LISTA1: Primer item&#10;boxverde: Nota importante"></textarea>
        </div>

        <button onclick="uploadToFirestore()">Desplegar a Firestore</button>
        
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCK8SLFcVDyvLUUzVjOWOBDGHi0kD8-cKs",
            authDomain: "bancomicina-62bfe.firebaseapp.com",
            projectId: "bancomicina-62bfe",
            storageBucket: "bancomicina-62bfe.appspot.com",
            messagingSenderId: "737254665977",
            appId: "1:737254665977:web:dbafb6c16ad9d96fae7c28"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        async function uploadToFirestore() {
            const path = document.getElementById('targetPath').value.trim();
            const text = document.getElementById('plainText').value.trim();
            const status = document.getElementById('status');

            if (!path || !text) {
                showStatus("Faltan datos", "error");
                return;
            }

            // Parser ultracorto: split por líneas y primer ":"
            const data = {};
            text.split('\n').forEach(line => {
                const index = line.indexOf(':');
                if (index !== -1) {
                    const key = line.substring(0, index).trim();
                    const val = line.substring(index + 1).trim();
                    if (key) data[key] = val;
                }
            });

            if (Object.keys(data).length === 0) {
                showStatus("No se detectaron etiquetas válidas (formato ETIQUETA: contenido)", "error");
                return;
            }

            try {
                showStatus("Subiendo datos...", "loading");
                await firebase.firestore().doc(path).set({
                    ...data,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                showStatus("✅ ¡Subido con éxito a Firestore!", "success");
            } catch (e) {
                console.error(e);
                showStatus("❌ Error: " + e.message, "error");
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = type;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
