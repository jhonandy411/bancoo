<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>HTML Segment Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #1f2933;
    }

    header {
      padding: 16px 20px;
      background: #111827;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 56px);
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      padding: 12px 16px;
      background: #e5e7eb;
      border-bottom: 1px solid #d1d5db;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      resize: none;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      outline: none;
      background: #0f172a;
      color: #e5e7eb;
    }

    .controls {
      padding: 12px 16px;
      border-top: 1px solid #d1d5db;
      background: #f9fafb;
      display: flex;
      gap: 8px;
    }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .preview {
      flex: 1;
      overflow: auto;
      padding: 24px;
      background: #ffffff;
    }

    /* 👇 estilos mínimos para que se vea “tipo Amboss” */
    .article-h3-divider {
      height: 2px;
      background: #e5e7eb;
      margin: 8px 0 16px;
    }

    .leitwort {
      font-weight: 600;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px 10px;
      vertical-align: top;
    }

    th {
      background: #f3f4f6;
      font-weight: 600;
      text-align: left;
    }

    ul {
      margin: 6px 0 6px 18px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    HTML Segment Renderer
  </header>

  <div class="layout">
    <!-- PANEL IZQUIERDO -->
    <div class="panel">
      <h2>HTML de entrada</h2>
      <textarea id="input">
<!-- Pegá acá tu bloque HTML -->
<h3>Approach</h3>
<div class="article-h3-divider"></div>
<p><strong>All patients</strong></p>
<ul>
  <li>Obtain 12-lead ECG immediately.</li>
  <li>Evaluate for signs of unstable bradycardia.</li>
</ul>
      </textarea>
      <div class="controls">
        <button onclick="renderHTML()">Renderizar</button>
        <button onclick="clearPreview()">Limpiar</button>
      </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel">
      <h2>Vista previa renderizada</h2>
      <div id="preview" class="preview"></div>
    </div>
  </div>

  <script>
    function renderHTML() {
      const html = document.getElementById("input").value;
      document.getElementById("preview").innerHTML = html;
    }

    function clearPreview() {
      document.getElementById("preview").innerHTML = "";
    }
  </script>
</body>
</html>
