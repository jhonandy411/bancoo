  <link rel="stylesheet" href="amboss-clone.css">
  <style>
  .is-selected { border-left: 4px solid #a3b2bd !important; background-color: rgb(245, 246, 248); }
  
  .css-19fohpc-StyledH5 {
  padding-inline: 20px;
}
  </style>

<body>
  

  <div role="list" data-ds-id="Box" class="css-m5oc3j-StyledBox ebcgi2u0">
    <div data-ds-id="Box" class="css-1rdbpqd-StyledBox ebcgi2u0">
      <h3 data-ds-id="H5" class="css-19fohpc-StyledH5 eqtv71d4">
        Latest sessions
      </h3>
    </div>

    <div
      class="_0aed7b478bfe4386--listItemContainer _0aed7b478bfe4386--delineated _0aed7b478bfe4386--squareCorners"
      data-e2e-test-id="sessions-history"
    >
      <!-- Loaded dynamically -->
    </div>
  </div>

  <script>
    // --- Dependency Bridge (Inherit from Portal) ---
    if (window.parent && window.parent !== window) {
        window.firebase = window.parent.firebase;
        window.db = window.parent.db;
    }

    (function() {
      window.loadSession = function(id, el) {
          sessionStorage.setItem('currentSessionId', id);
          document.querySelectorAll('.ed71ad0ad070e9f8--item').forEach(i => i.classList.remove('is-selected'));
          if (el) el.closest('.ed71ad0ad070e9f8--item').classList.add('is-selected');
          
          if (window.parent && window.parent.loadSessionFromId) {
              window.parent.loadSessionFromId(id);
          } else if (window.loadSessionFromId) {
              window.loadSessionFromId(id);
          }
      };

      const container = document.querySelector('[data-e2e-test-id="sessions-history"]');
      if (!container) return;

      const user = firebase.auth().currentUser;
      if (!user) {
        container.innerHTML = '<p style="padding: 16px;">Please log in to view sessions.</p>';
        return;
      }

      window.db.collection('users').doc(user.uid).collection('qbankAnalyticsSessions')
        .orderBy('createdAt', 'desc')
        .limit(20)
        .get()
        .then(snapshot => {
          if (snapshot.empty) {
            container.innerHTML = '<p style="padding: 16px;">No recent sessions found.</p>';
            return;
          }

          let html = '';
          snapshot.forEach(doc => {
            const data = doc.data();
            const total = (data.completedCount || 0) + (data.pendingCount || 0) || (data.questions ? data.questions.length : 0);
            const current = data.completedCount || 0;
            const corrects = data.correctCount || 0;
            const incorrects = data.incorrectCount || 0;
            const hints = data.correctUsingHints || data.hintsCount || 0;
            const correctPct = total > 0 ? (corrects / total * 100) : 0;
            const incorrectPct = total > 0 ? (incorrects / total * 100) : 0;
            const hintsPct = total > 0 ? (hints / total * 100) : 0;
            // Clean topic name from ID/Path if needed
            let topicName = data.categoriaId || 'Unknown Topic';
            if (topicName.includes('/')) topicName = topicName.split('/').pop();
            topicName = topicName.replace(/_/g, ' ');

            // Determine active/current based on some logic? For now, first one could be active or none.
            // Using "aria-current" logic from template
            const isActive = false; 

            html += `
      <div role="listitem" data-ds-id="Box" aria-current="${isActive}" class="css-13zyw7j-StyledBox ebcgi2u0">
        <div class="ed71ad0ad070e9f8--item ${isActive ? 'ed71ad0ad070e9f8--selected' : ''}" data-e2e-test-id="sidebar-item">
          <!-- Link to analysis with session ID -->
          <div class="ac38006eca9237c9--link" style="cursor: pointer;" onclick="loadSession('${doc.id}', this)">
            <div data-ds-id="Box" class="css-1ah1az-StyledBox ebcgi2u0">
              ${isActive ? '<div class="c5148dfb236a1689--selectedHighlight" data-test-id="selectedhighlight"></div>' : ''}

              <p data-ds-id="Text" class="css-13xrbve-StyledText eadloo90">
                <span data-ds-id="Text" class="css-qedpc1-StyledText eadloo90">Study mode:</span> Questions based on "${topicName}" (not yet seen or skipped)
              </p>

              <div class="_876f7e642366e9b7--namedProgressBar" data-e2e-test-id="session-performance" data-testid="session-performance">
                <div data-ds-id="Icon" data-variant="tertiary" class="css-188rmzb-StyledIcon e1tsg83e0">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12 8a1 1 0 1 0-2 0v4a1 1 0 0 0 2 0z"></path>
                    <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M8 2a1 1 0 0 1 1-1h4a1 1 0 1 1 0 2v.723a9.02 9.02 0 0 1 6.197 5.056 3.121 3.121 0 0 1 3.63 5.045h-.002l-10.197 8.947a1 1 0 0 1-.665.248L8.494 23a1 1 0 0 1-.969-1.223l.192-.839-.013-.005C4.374 19.653 2 16.353 2 12.5a9 9 0 0 1 7-8.777V3a1 1 0 0 1-1-1m3 3.5a7 7 0 0 1 6.583 4.613l-8.987 7.835a1 1 0 0 0-.318.531l-.11.484C5.739 17.91 4 15.42 4 12.5a7 7 0 0 1 7-7m9.85 4.853a1.12 1.12 0 0 0-.813.274l-7.521 6.557 1.611 1.612 7.382-6.477.002-.002a1.121 1.121 0 0 0-.66-1.964Zm-8.23 9.764-1.615-1.615-.85.74-.402 1.765 1.842.01z"></path>
                  </svg>
                </div>

                <div data-ds-id="Box" class="css-13zyw7j-StyledBox ebcgi2u0">
                  <div data-ds-id="Stack" class="css-bkwbtj-StackContainer e7wwwvf0">
                    <div class="css-10ts8ay-StackItem e7wwwvf1">
                      <p data-ds-id="Text" class="css-mx9yxp-StyledText eadloo90">
                        ${current}/${total} Questions
                      </p>
                    </div>

                    <div class="css-10ts8ay-StackItem e7wwwvf1">
                      <div data-ds-id="SegmentedProgressBar" class="css-wvxxuf-StyledContainer e1hklaqt4">
                        <div data-e2e-test-id="progressBarContainer" class="css-mt7xf9-StyledProgressBarContainer e1hklaqt0">
                          <div style="display: flex; width: 100%; height: 4px; border-radius: 2px; overflow: hidden; background: #e5e7eb;">
                            <div style="width: ${correctPct}%; background: #10b981;"></div>
                            <div style="width: ${hintsPct}%; background: #f59e0b;"></div>
                            <div style="width: ${incorrectPct}%; background: #ef4444;"></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="css-10ts8ay-StackItem e7wwwvf1"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
            `;
          });
          container.innerHTML = html;
          const first = container.querySelector('.ac38006eca9237c9--link');
          if (first) first.click();
        })
        .catch(err => {
          console.error('Error fetching sessions:', err);
          container.innerHTML = '<p style="padding: 16px; color: red;">Error loading sessions.</p>';
        });
    })();
  </script>
    </div>
  </div>

</body>
