<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive image viewer</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #0f0f10;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .topbar {
      width: min(100%, 920px);
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #3a3a3a;
      background: #1a1a1c;
      color: #fff;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .viewer {
      width: min(100%, 920px);
      height: 430px;
      border-radius: 18px;
      background: #1a1a1c;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .status {
      color: #b8b8b8;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <input
      id="driveUrl"
      type="text"
      value="https://drive.google.com/file/d/1LqYqF6W66jENyWheFHagD5HZcs9hqdp0/view"
    />
    <button onclick="loadDriveImage()">Cargar</button>
  </div>

  <div class="viewer">
    <div class="status" id="status">Esperando imagen…</div>
    <img id="image" alt="Imagen desde Drive" />
  </div>

  <script>
    function extractFileId(url) {
      const patterns = [
        /\/file\/d\/([a-zA-Z0-9_-]+)/,
        /[?&]id=([a-zA-Z0-9_-]+)/,
        /^([a-zA-Z0-9_-]{20,})$/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }
      return null;
    }

    function loadDriveImage() {
      const input = document.getElementById("driveUrl").value.trim();
      const img = document.getElementById("image");
      const status = document.getElementById("status");

      img.style.display = "none";
      img.removeAttribute("src");
      status.style.display = "block";
      status.textContent = "Cargando…";

      const fileId = extractFileId(input);

      if (!fileId) {
        status.textContent = "No se pudo extraer el ID del archivo.";
        return;
      }

      const candidates = [
        `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000`,
        `https://lh3.googleusercontent.com/d/${fileId}=w2000`,
        `https://drive.google.com/uc?export=view&id=${fileId}`
      ];

      tryNext(0);

      function tryNext(index) {
        if (index >= candidates.length) {
          status.textContent = "No se pudo mostrar una versión limpia de la imagen.";
          return;
        }

        const test = new Image();

        test.onload = function () {
          if (!test.naturalWidth || !test.naturalHeight) {
            tryNext(index + 1);
            return;
          }

          img.onload = null;
          img.onerror = null;
          img.src = candidates[index];
          img.style.display = "block";
          status.style.display = "none";
        };

        test.onerror = function () {
          tryNext(index + 1);
        };

        test.src = candidates[index];
      }
    }

    loadDriveImage();
  </script>
</body>
</html>
