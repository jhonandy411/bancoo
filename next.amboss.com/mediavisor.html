<style>
/* ===== LAYOUT GENERAL EXACTO (como captura) ===== */
html, body { height: 100%; margin: 0; }
body { overflow: hidden; }

/* NAV arriba + layout abajo */
.media-viewer-shell{
  height: 100vh;
  display: grid;
  grid-template-rows: 56px 1fr; /* barra superior como Amboss */
  min-height: 0;
}

/* Sidebar + contenido */
.media-viewer-layout{
  height: 100%;
  display: grid;
  grid-template-columns: 360px 1fr;
  min-height: 0;
}

/* Sidebar scrolleable */
._4a059b1ad835e912--container{
  min-height: 0;
  overflow: auto;
  background: #1f232a; /* oscuro */
}

/* Columna derecha: IMPORTANTÍSIMO (referencia para bottom bar) */
._21c86b6a1014ea14--content{
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative; /* <- bottom bar absolute se ancla acá */
  background: #f6f7f9;
}

/* Stage ocupa lo disponible */
#viewer-zoom-root{
  flex: 1;
  min-height: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 24px;
  padding-bottom: calc(24px + 140px); /* deja lugar para la bar (como captura) */
  background: #f6f7f9;
}

/* NO anules el transform globalmente si querés zoom real.
   En su lugar: hacemos que el contenido "base" escale bien. */
#viewer-zoomable-image{
  max-width: 100%;
  max-height: 100%;
}

/* Contenedor del “paper” blanco */
#viewer-zoomable-image [data-e2e-test-id="fullscreen-image"]{
  width: auto !important;
  height: auto !important;
  max-width: min(1100px, 100%);
  max-height: 100%;
  background: #fff;
  box-shadow: 0 8px 22px rgba(0,0,0,.12);
}

/* SVG/IMG: contain */
#viewer-zoomable-image svg,
#viewer-zoomable-image img{
  display: block;
  width: 100%;
  height: auto;
  max-height: 100%;
}

/* ===== BOTTOM BAR: pegada al fondo, SOLO UNA ===== */
.css-i2j9hs-StyledBottomBar{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 140px;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

/* contenedor central */
.css-a0zhv4-StyledWrapper{
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 2;
}

/* flechas */
.css-1s7vfcv-StyledButton{
  background: rgba(0,0,0,.35);
  border-radius: 999px;
  width: 40px;
  height: 40px;
}

/* thumbnails */
.css-1dplf75-StyledOuterContainer{ overflow: hidden; max-width: 520px; }
.css-1w6q99v-StyledInnerContainer{ display: flex; gap: 12px; }

.css-1mwt45n-StyledThumbnail{
  width: 72px;
  height: 96px;
  border-radius: 12px;
  background: #fff;
  padding: 4px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
}

.css-pqw2-StyledMediaContainer{ border-radius: 10px; overflow: hidden; }
.css-1goz906-StyledImg{ object-fit: cover; }

/* chevron */
.css-fhifl-StyledToggleButtonContainer{
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
}
.css-tvsuf5-StyledToggleButton{
  background: rgba(40,44,52,.9);
  border-radius: 999px;
  width: 36px;
  height: 36px;
}

            </div>
          </div>
          <div class="css-17o556n-StackItem e7wwwvf1">

              <div class="css-1mpk5ch-StackItem e7wwwvf1">
                <p data-ds-id="Text" class="css-yi9dvf-StyledText eadloo90">
                <div class="_294ae82bb7ec21b1--abstract" id="viewer-abstract">
                  <p>The most prominent structure of the eukaryotic cell is the nucleus, which contains chromatin (DNA).
                    The endoplasmic reticulum (ER) surrounds the nucleus. There are two distinct types of ER: rough ER,
                    which is covered by ribosomes, and smooth ER, which lacks ribosomes. Another part of the
                    endomembrane system is the Golgi apparatus, which buds off exocytotic vesicles and is associated
                    with the lysosomal system. Each eukaryotic cell contains several mitochondria. Mitochondria are
                    surrounded by a double membrane, with the inner membrane containing many folds (cristae). The cell
                    is stabilized by its cytoskeleton, which traverses the entire cell.</p>
