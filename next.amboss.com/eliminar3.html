<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uploader Firestore (1000–1050)</title>

  <!-- Firebase v8 (compat con tu initializeApp/auth) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; margin: 24px; color:#111; }
    .card { max-width: 820px; margin: 0 auto; background:#fff; border:1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .row { display:flex; gap: 12px; flex-wrap: wrap; align-items:center; }
    button { padding: 10px 14px; border-radius: 10px; border:1px solid #d1d5db; background:#111; color:#fff; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .muted { color:#6b7280; font-size: 13px; }
    pre { background:#0b1020; color:#e5e7eb; padding: 12px; border-radius: 10px; overflow:auto; font-size: 12px; line-height:1.4; }
    .ok { color:#16a34a; }
    .bad { color:#dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Subir 51 documentos (1000 → 1050) a Firestore</h1>

    <div class="row">
      <button id="btnLogin">Login con Google</button>
      <button id="btnUpload" disabled>Subir 1000–1050</button>
      <span id="status" class="muted">Esperando login…</span>
    </div>

    <p class="muted" style="margin-top:10px">
      Ruta destino:
      <br>
      <code>/supracategorias/Cardiología y cirugía cardiovascular/categorias/Anatomía y fisiología cardiaca/subcategorias/Generalidades/preguntas/{ID}</code>
    </p>

    <pre id="log"></pre>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCK8SLFcVDyvLUUzVjOWOBDGHi0kD8-cKs",
      authDomain: "bancomicina-62bfe.firebaseapp.com",
      projectId: "bancomicina-62bfe",
      storageBucket: "bancomicina-62bfe.appspot.com",
      messagingSenderId: "737254665977",
      appId: "1:737254665977:web:dbafb6c16ad9d96fae7c28"
    };
    firebase.initializeApp(firebaseConfig);
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    const auth = firebase.auth();
    const db = firebase.firestore();

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");
    const statusEl = $("status");
    const btnLogin = $("btnLogin");
    const btnUpload = $("btnUpload");

    function log(msg, cls) {
      const line = document.createElement("div");
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, cls) {
      statusEl.className = "muted" + (cls ? " " + cls : "");
      statusEl.textContent = text;
    }

    function preguntasCollectionRef() {
      return db
        .collection("supracategorias").doc("Cardiología y cirugía cardiovascular")
        .collection("categorias").doc("Anatomía y fisiología cardiaca")
        .collection("subcategorias").doc("Generalidades")
        .collection("preguntas");
    }

    async function loginGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    }

    async function uploadDocs() {
      btnUpload.disabled = true;
      btnLogin.disabled = true;
      logEl.textContent = "";
      setStatus("Subiendo…", "");

      const colRef = preguntasCollectionRef();
      const batch = db.batch();

      // 1000..1050 inclusive = 51 docs
      for (let i = 1000; i <= 1050; i++) {
        const id = String(i);
        const docRef = colRef.doc(id);

        // Cada documento tendrá su id (y también guardamos createdAt opcional)
        batch.set(docRef, {
          id: i,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        log(`Preparado doc ${id}`);
      }

      try {
        await batch.commit();
        setStatus("Listo: se subieron/actualizaron 1000–1050.", "ok");
        log("✅ Batch commit OK (1000–1050).", "ok");
      } catch (e) {
        setStatus("Error al subir. Mirá el log.", "bad");
        log("❌ Error: " + (e && e.message ? e.message : String(e)), "bad");
      } finally {
        btnLogin.disabled = false;
        btnUpload.disabled = !auth.currentUser;
      }
    }

    btnLogin.addEventListener("click", async () => {
      try {
        setStatus("Iniciando sesión…", "");
        await loginGoogle();
      } catch (e) {
        setStatus("No se pudo loguear.", "bad");
        log("❌ Login error: " + (e && e.message ? e.message : String(e)), "bad");
      }
    });

    btnUpload.addEventListener("click", uploadDocs);

    auth.onAuthStateChanged((user) => {
      if (user) {
        setStatus("Logueado: " + (user.email || "usuario"), "ok");
        btnUpload.disabled = false;
      } else {
        setStatus("Esperando login…", "");
        btnUpload.disabled = true;
      }
    });
  </script>
</body>
</html>
