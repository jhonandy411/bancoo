  <script>


    // Cargar contenido en el panel principal desde un HTML externo
    function loadMainContent(url) {
      var main = document.getElementById('main-content');
      if (!main) return;

      // Limpiar modo split si estaba activo
      main.classList.remove('split-mode');
      main.innerHTML = ''; 

      fetch(url)
        .then(function (response) {
          if (!response.ok) throw new Error('Error cargando ' + url);
          return response.text();
        })
        .then(function (html) {
          main.innerHTML = html;

          // Ejecutar scripts que vengan en el HTML inyectado
          var scripts = main.querySelectorAll('script');
          scripts.forEach(function (oldScript) {
            var newScript = document.createElement('script');
            // Copiar atributos (src, type, etc.)
            Array.from(oldScript.attributes).forEach(function (attr) {
              newScript.setAttribute(attr.name, attr.value);
            });
            // Copiar contenido inline
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            // Reemplazar el script viejo por el nuevo para que el navegador lo ejecute
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
        })
        .catch(function (err) {
          console.error('No se pudo cargar el contenido:', err);
        });
    }
    window.loadMainContent = loadMainContent;














    





    

    // Expuesta para que articles.html pueda abrir
    // la vista de contenido de subcategoría al hacer
    // clic en un ítem del tercer panel.
    window.showSubcatFromArticles = function (subcat) {
      console.log('Loading content for subcat:', subcat);
      
      // Update or clear document path in sessionStorage
      if (subcat && subcat.docPath) {
        sessionStorage.setItem('currentDocPath', subcat.docPath);
        console.log('Set document path:', subcat.docPath);
        
        // Save to recent articles
        try {
          const user = firebase.auth().currentUser;
          const title = subcat.titulo || subcat.denominacion || subcat.title || subcat.nombre || 'Untitled article';
          
          if (user) {
            // Use subcat.id as document ID for shorter and cleaner path
             const docId = subcat.id || btoa(subcat.docPath).replace(/\//g, '_').replace(/\+/g, '-');
             db.collection('users').doc(user.uid).collection('recentArticles').doc(docId).set({
              id: subcat.id || '',
              title: title,
              docPath: subcat.docPath,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }

          // Fallback to localStorage
          const recent = JSON.parse(localStorage.getItem('recentArticles') || '[]');
          const filtered = recent.filter(item => item.docPath !== subcat.docPath);
          filtered.unshift({ title: title, docPath: subcat.docPath, timestamp: Date.now() });
          localStorage.setItem('recentArticles', JSON.stringify(filtered.slice(0, 10)));
        } catch (e) {
          console.error('Error saving recent articles:', e);
        }
      } else {
        sessionStorage.removeItem('currentDocPath');
        console.log('Cleared document path (missing docPath)');
      }
      
      // Colapsar sidebar al entrar en contenido de subcategoría
      minimizeSidebar();
      
      // Limpiar selección del sidebar principal (Library icon highlight, etc)
      if (typeof clearMainSidebarSelections === 'function') {
        clearMainSidebarSelections();
      }

      const mainContent = document.getElementById('main-content');
      if (!mainContent) return;

      // Show loading state
      mainContent.innerHTML = '<div style="padding: 40px; text-align: center;"><span data-loading-spinner data-size="20"></span></div>';
      if (window.AmbossUI && window.AmbossUI.initLoadingSpinners) {
        window.AmbossUI.initLoadingSpinners();
      }

      // 1. Check if content is already merged in the subcategory object
      if (subcat.html_completo) {
        console.log('Content found directly in subcategory object.');
        mainContent.innerHTML = subcat.html_completo;
        return;
      }

      // 2. Fallback: Try to fetch from 'articulos_contenido' (legacy/alternative method)
      if (subcat.id) {
        db.collection('articulos_contenido').doc(subcat.id).get()
          .then((doc) => {
            if (doc.exists) {
              const data = doc.data();
              mainContent.innerHTML = data.html_completo || '<p>No content available.</p>';
            } else {
              console.warn('Content not found in merged object or separate collection. ID:', subcat.id);
              // 3. Last resort: Static file
              loadMainContent('subcategoriacontent.html');
            }
          })
          .catch((error) => {
            console.error('Error getting content document:', error);
            mainContent.innerHTML = '<p>Error loading content. Please try again.</p>';
          });
      } else {
        loadMainContent('subcategoriacontent.html');
      }
    };

    // Función para minimizar el sidebar (modo iconos)
    function minimizeSidebar(sidebarUrl) {
      sidebarUrl = sidebarUrl || 'sidebar-toc.html'; // Default to article TOC

      var navChild = document.querySelector('.d5fef2c66969dc7e--contextNavChild');
      if (navChild) {
        navChild.classList.add('d5fef2c66969dc7e--l0Collapsed');
      }

      // Respetar el estado de visibilidad persistido
      var sidebarWrapper = document.getElementById('sidebar-wrapper');
      if (sidebarWrapper) {
          const isPersistedVisible = localStorage.getItem('sidebarVisible');
          if (isPersistedVisible === 'false') {
              sidebarWrapper.classList.add('bancomicina-sidebar-hidden');
              document.body.classList.add('sidebar-collapsed');
          } else {
              sidebarWrapper.classList.remove('bancomicina-sidebar-hidden');
              document.body.classList.remove('sidebar-collapsed');
          }
      }
      
      // Cargar y mostrar sidebar secundaria (L1)
      var l1Sidebar = document.getElementById('context-nav-l1');
      if (l1Sidebar) {
        // Check if we need to load different content
        var currentUrl = l1Sidebar.getAttribute('data-loaded-url');
        var currentContext = sessionStorage.getItem('currentDocPath') || '';
        var previousContext = l1Sidebar.getAttribute('data-loaded-context');

        // Si es la misma URL Y el mismo contexto (mismo artículo), usar caché
        if (currentUrl === sidebarUrl && previousContext === currentContext && l1Sidebar.innerHTML.trim() !== '') {
           l1Sidebar.style.display = 'block';
           return;
        }

        // Update current loaded attributes
        l1Sidebar.setAttribute('data-loaded-url', sidebarUrl);
        l1Sidebar.setAttribute('data-loaded-context', currentContext);

        // Cargar contenido dinámicamente
        fetch(sidebarUrl)
            .then(function(response) {
              if (!response.ok) throw new Error('Error cargando ' + sidebarUrl);
              return response.text();
            })
            .then(function(html) {
              l1Sidebar.innerHTML = html;
              l1Sidebar.style.display = 'block';
              
              // Ejecutar scripts que vengan en el HTML inyectado
              var scripts = l1Sidebar.querySelectorAll('script');
              scripts.forEach(function (oldScript) {
                var newScript = document.createElement('script');
                // Copiar atributos (src, type, etc.)
                Array.from(oldScript.attributes).forEach(function (attr) {
                  newScript.setAttribute(attr.name, attr.value);
                });
                // Copiar contenido inline
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                // Reemplazar el script viejo por el nuevo para que el navegador lo ejecute
                oldScript.parentNode.replaceChild(newScript, oldScript);
              });
            })
            .catch(function(err) {
              console.error('No se pudo cargar la sidebar secundaria:', err);
              l1Sidebar.innerHTML = '<p style="padding:10px; color:red">Error loading sidebar.</p>';
            });
      }
    }

    // Función para restaurar el sidebar (modo normal)
    function resetSidebar() {
      var navChild = document.querySelector('.d5fef2c66969dc7e--contextNavChild');
      if (navChild) {
        navChild.classList.remove('d5fef2c66969dc7e--l0Collapsed');
      }

      // Ocultar sidebar secundaria (L1)
      var l1Sidebar = document.getElementById('context-nav-l1');
      if (l1Sidebar) {
        l1Sidebar.style.display = 'none';
      }
    }

    window.minimizeSidebar = minimizeSidebar;
    window.resetSidebar = resetSidebar;

    // Función para cargar Qbank Session con sidebar colapsada
    window.loadQbankSession = function() {
      console.log('Loading Qbank Session...');
      
      // Reset answered questions for a fresh session
      sessionStorage.removeItem('answeredQuestions');

      // Colapsar sidebar principal y mostrar secundaria específica de Qbank
      minimizeSidebar('sidebar-toc2.html');
      
      // Cargar contenido de qbanksesion.html
      loadMainContent('qbanksesion.html');

    // Función para cargar Session Analysis con sidebar colapsada
    window.loadSessionAnalysis = function() {
      console.log('Loading Session Analysis...');
      minimizeSidebar('sidebartoc3.html');
      loadMainContent('analysis.html');
    }

    // Función para cargar Vista Dividida (Split View)
    window.loadSplitView = function(gallery, index) {
      console.log('Loading Split View...', gallery ? `with ${gallery.length} items` : 'no gallery data');
      var main = document.getElementById('main-content');
      if (!main) return;

      // Check if already in split mode to avoid accumulation/nesting
      if (main.classList.contains('split-mode')) {
         console.log('Already in split mode, just updating right panel if needed.');
         var splitRight = document.getElementById('split-right');
         if(splitRight) {
             splitRight.innerHTML = ''; // clear current right content
             inject(typeof gallery === 'string' ? gallery : 'mediavisor2.html', splitRight);
         }
         return;
      }

      // 1. Capture current scroll position of main content (or window, depending on layout)
      // Since body has overflow:hidden and main usually scrolls? 
      // Actually per CSS: #main-content.split-mode { overflow: hidden }
      // But before split mode, main might be scrolling if it has overflow: auto/scroll
      // Let's try to get scrollTop from main or its first child if applicable.
      var previousScrollTop = main.scrollTop;

      // 2. Identify existing content
      // We'll move ALL children of main into the new split-left panel
      var existingContent = [];
      while (main.firstChild) {
        existingContent.push(main.firstChild);
        main.removeChild(main.firstChild);
      }

      // 3. Set up Split Mode containers
      main.classList.add('split-mode');
      
      var splitLeft = document.createElement('div');
      splitLeft.id = 'split-left';
      splitLeft.className = 'split-panel';
      
      var splitRight = document.createElement('div');
      splitRight.id = 'split-right';
      splitRight.className = 'split-panel';
      
      main.appendChild(splitLeft);
      main.appendChild(splitRight);

      // 4. Move content to Left Panel
      if (existingContent.length > 0) {
        existingContent.forEach(function(node) {
          splitLeft.appendChild(node);
        });
        // Restore scroll position to the new container
        splitLeft.scrollTop = previousScrollTop;
        console.log('Moved existing content to split-left. Restored scrollTop:', previousScrollTop);
      } else {
        // Fallback if empty
        inject('subcategoriacontent.html', splitLeft);
      }

      // 5. Always inject Right Panel content
      inject(typeof gallery === 'string' ? gallery : 'mediavisor2.html', splitRight);

      // 6. Highlight LABS button if applicable
      if (gallery === 'labs.html') {
        const labBtn = document.querySelector('[data-e2e-test-id="lab-btn"]');
        const underline = labBtn?.nextElementSibling;
        if (underline && underline.classList.contains('_6ccf46c0427cb323--underline')) {
          underline.style.display = 'block';
        }
      }
      
      // Dispatch event to notify layout change
      window.dispatchEvent(new CustomEvent('amboss:splitview-toggled', { detail: { active: true } }));

      // Función auxiliar para inyectar contenido en paneles
      function inject(url, panel) {
        fetch(url)
          .then(res => {
            if (!res.ok) throw new Error('Error cargando ' + url);
            return res.text();
          })
          .then(html => {
            // Eliminar etiquetas body/html si vienen en el fragmento para evitar conflictos
            var template = document.createElement('template');
            template.innerHTML = html.trim();
            panel.appendChild(template.content);

            // Re-ejecutar scripts
            var scripts = panel.querySelectorAll('script');
            scripts.forEach(oldScript => {
              var newScript = document.createElement('script');
              Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
              newScript.appendChild(document.createTextNode(oldScript.innerHTML));
              oldScript.parentNode.replaceChild(newScript, oldScript);
            });

            // Si hay datos de galería y estamos en el panel derecho (donde va el visor), inicializarlo
            if (url.includes('mediavisor2.html') && gallery) {
               // Hacemos un pequeño delay para asegurar que los scripts se ejecutaron
               setTimeout(() => {
                 window.postMessage({
                    type: 'INIT_GALLERY',
                    gallery: gallery,
                    index: index || 0
                 }, '*'); // Enviamos a la misma ventana (self)
               }, 100);
            }
          })
          .catch(err => console.error(err));
      }
    }

    // --- Split View Management (Unified) ---
    // (loadSplitView is defined above)

    // Utilidad genérica para colapsar/expandir elementos padre que tienen hijos
    function initCollapsibleSidebar(options) {
      var containers = document.querySelectorAll(options.containerSelector);

      containers.forEach(function (container) {

    window.openMediaViewer2 = function(url, gallery, index) {
      const mv2 = document.getElementById('mv2');
      const mv2f = document.getElementById('mv2f');
      
      if (!mv2 || !mv2f) return;

      // 1. Hide overlay and clear iframe immediately
      mv2.style.display = "none";
      mv2f.src = '';

      // 2. Check if split mode is active and close it first
      const main = document.getElementById('main-content');
      if (main && main.classList.contains('split-mode')) {
        console.log('Split mode detected, closing before opening overlay...');
        
        // Find existing content in split-left
        var splitLeft = document.getElementById('split-left');
        var previousScrollTop = 0;
        
        if (splitLeft) {
            // Capture scroll top of the split panel
            previousScrollTop = splitLeft.scrollTop;
            
            // Move ALL children of split-left back to main-content
            while(splitLeft.firstChild) {
                main.appendChild(splitLeft.firstChild);
            }
        }

        // Remove split wrappers
        var splitRight = document.getElementById('split-right');
        if (splitLeft) splitLeft.parentNode.removeChild(splitLeft);
        if (splitRight) splitRight.parentNode.removeChild(splitRight);

        // Clean up main class
        main.classList.remove('split-mode');
        
        // Restore scroll position
        main.scrollTop = previousScrollTop;
        console.log('Split mode closed. Restored scroll position:', previousScrollTop);
      }

      // 3. Load new image and show overlay only after split is closed
      setTimeout(function() {
        mv2f.src = url;
        
        // Listen for iframe load to send gallery data
        mv2f.onload = function() {
          // Show overlay only when new image is loaded
          mv2.style.display = "block";
          document.body.style.overflow = "hidden";
          
          if (gallery) {
            mv2f.contentWindow.postMessage({
              type: 'INIT_GALLERY',
              gallery: gallery,
              index: index || 0
            }, '*');
          }
        };
      }, 100);
    };

    window.closeMediaViewer2 = function() {
      const mv2 = document.getElementById('mv2');
      const mv2f = document.getElementById('mv2f');
      
      // 1. Close overlay if open
      if (mv2 && mv2f && mv2.style.display === "block") {
        mv2f.src = "";
        mv2.style.display = "none";
        document.body.style.overflow = "";
      }

      // 2. Clear split mode if active
      const main = document.getElementById('main-content');
      if (main && main.classList.contains('split-mode')) {
        console.log('Split mode detected, reverting...');
        
        // Find existing content in split-left
        var splitLeft = document.getElementById('split-left');
        var previousScrollTop = 0;
        
        if (splitLeft) {
            // Capture scroll top of the split panel
            previousScrollTop = splitLeft.scrollTop;
            
            // Move ALL children of split-left back to main-content
            while(splitLeft.firstChild) {
                main.appendChild(splitLeft.firstChild);
            }
        }

        // Remove split wrappers
        var splitRight = document.getElementById('split-right');
        if (splitLeft) splitLeft.parentNode.removeChild(splitLeft); // remove empty split left
        if (splitRight) splitRight.parentNode.removeChild(splitRight); // remove split right

        // Clean up main class
        main.classList.remove('split-mode');
        
        // Restore scroll position
        main.scrollTop = previousScrollTop;
        console.log('Restored main content. Top:', previousScrollTop);
        window.dispatchEvent(new CustomEvent('amboss:splitview-toggled', { detail: { active: false } }));
      }
    };

    // Función para salir de Vista Dividida
    window.exitSplitView = function() {
      console.log('Exiting Split View...');
      const main = document.getElementById('main-content');
      const mv2 = document.getElementById('mv2');
      const splitRight = document.getElementById('split-right');
      const isMedia = !!splitRight?.querySelector('.media-viewer-shell');

      // 1. Revert Split Mode if active
      if (main && main.classList.contains('split-mode')) {
         var splitLeft = document.getElementById('split-left');
         var previousScrollTop = 0;
         if (splitLeft) {
            previousScrollTop = splitLeft.scrollTop;
            while(splitLeft.firstChild) {
                main.appendChild(splitLeft.firstChild);
            }
            splitLeft.remove();
         }
         if (splitRight) splitRight.remove();
         
         main.classList.remove('split-mode');
         main.scrollTop = previousScrollTop;
      }

      // 2. Hide/Show Overlay and Reset State
      if (mv2) mv2.style.display = isMedia ? "block" : "none";
      document.body.style.overflow = isMedia ? "hidden" : "";

      // 3. Deactivate LABS button if it was active
      const labBtn = document.querySelector('[data-e2e-test-id="lab-btn"]');
      if (labBtn) {
        const underline = labBtn.nextElementSibling;
        if (underline && underline.classList.contains('_6ccf46c0427cb323--underline')) {
          underline.style.display = 'none';
        }
      }
      
      window.dispatchEvent(new CustomEvent('amboss:splitview-toggled', { detail: { active: false } }));

      console.log('Split view closed. Overlay:', isMedia);
    };
  </script>

  <script>
    (function() {
      window.quizModeOn = false;
      window.currentModalTable = null;

      window.openTableModal = function(originalTable) {
        const modalOverlay = document.getElementById("table-modal-overlay");
        const modalContent = document.getElementById("modal-table-content");

        if (modalOverlay && modalContent) {
          const clonedTable = originalTable.cloneNode(true);
          currentModalTable = clonedTable;
          quizModeOn = false;
          
          const toggleBtn = document.getElementById('global-quiz-toggle-btn');
          if (toggleBtn) {
            const textNode = [...toggleBtn.childNodes].find(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
            if (textNode) textNode.textContent = " Start Quiz";
          }

          modalContent.innerHTML = "";
          modalContent.appendChild(clonedTable);
          modalOverlay.style.display = "flex";
          document.body.style.overflow = "hidden";
        }
      };

      window.closeTableModal = function() {
        const modalOverlay = document.getElementById("table-modal-overlay");
        if (modalOverlay) {
          modalOverlay.style.display = "none";
          document.body.style.overflow = "";
        }
        currentModalTable = null;
        quizModeOn = false;
      };

      window.enableTableQuiz = function() {
        if (!currentModalTable) return;
        const tds = currentModalTable.querySelectorAll("tbody td");
        tds.forEach((td) => {
          td.classList.add("_0fd30fac58084f1e--tdQuiz", "_0fd30fac58084f1e--tdHidden");
          td.classList.remove("revealed");
        });
        quizModeOn = true;
      };

      window.disableTableQuiz = function() {
        if (!currentModalTable) return;
        const tds = currentModalTable.querySelectorAll("tbody td");
        tds.forEach((td) => {
          td.classList.remove("_0fd30fac58084f1e--tdQuiz", "_0fd30fac58084f1e--tdHidden", "revealed");
        });
        quizModeOn = false;
      };

      document.addEventListener("click", function(e) {
        if (e.target.closest(".btn-minimize-table") || e.target.closest(".exit-modal-btn") || e.target.id === "table-modal-overlay") {
          window.closeTableModal();
        }

        const quizBtn = e.target.closest('#global-quiz-toggle-btn');
        if (quizBtn) {
          const textNode = [...quizBtn.childNodes].find(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim());
          if (!quizModeOn) {
            window.enableTableQuiz();
            if (textNode) textNode.textContent = " FINISH QUIZ";
          } else {
            window.disableTableQuiz();
            if (textNode) textNode.textContent = " Start Quiz";
          }
        }

        if (quizModeOn && currentModalTable) {
          const cell = e.target.closest("td");
          if (cell && currentModalTable.contains(cell) && cell.classList.contains("_0fd30fac58084f1e--tdHidden")) {
            // Si la celda ya está revelada y el click fue en un trigger de portal, no toggleamos (dejamos que actúe el popup)
            const isClickingTrigger = e.target.closest("a.tooltip__link, a.api[data-type='link'], span.api.dictionary, span.api.dictionary[data-type], span.api.explanation[data-type='bonus'], span.api.extraExplanation");
            if (isClickingTrigger && cell.classList.contains("revealed")) {
                return;
            }
            cell.classList.toggle("revealed");
          }
        }
      });
    })();
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Pre-cargar el overlay de búsqueda
    const ov = document.createElement('div');
    ov.id = 'sovl';
    ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:9999;display:none;justify-content:center';
    ov.innerHTML = '<iframe src="search.html" style="width:100%;height:100%;border:none;background:transparent;"></iframe>';
    const fr = ov.querySelector('iframe');
    
    fr.onload = () => {
      fr.contentDocument.body.onclick = (e) => { if(e.target === fr.contentDocument.body) ov.style.display = 'none'; };
      fr.contentWindow.addEventListener('keydown', (e) => { if(e.key === 'Escape') ov.style.display = 'none'; });
    };
    document.body.appendChild(ov);

    const showS = () => { 
      ov.style.display = 'flex'; 
      fr.contentWindow.focus(); 
      fr.contentWindow.postMessage('focus-search', '*');
    };

    const inp = document.getElementById('amboss-search-input');
    if(inp) inp.addEventListener('click', (e) => { e.preventDefault(); inp.blur(); showS(); });

    window.addEventListener('message', (e) => {
      if (e.data === 'show-search') showS();
      if (e.data === 'hide-search') ov.style.display = 'none';
    });

    // --- Account Menu Popup Logic ---
    const userMenuBtn = document.querySelector('[data-testid="user-menu-button"]');
    if (userMenuBtn) {
      const popupOv = document.createElement('div');
      popupOv.id = 'user-menu-popup-overlay';
      popupOv.style.cssText = 'position:fixed;inset:0;z-index:20000;display:none;';
      popupOv.innerHTML = `
          <div id="user-menu-popup-container" style="position:absolute; top:60px; right:20px; width:322px; height:650px; border-radius:12px; overflow:hidden; background:transparent;">
              <iframe src="logout.html" style="width:100%; height:100%; border:none; background:transparent;"></iframe>
          </div>
      `;
      document.body.appendChild(popupOv);

      userMenuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          popupOv.style.display = (popupOv.style.display === 'block') ? 'none' : 'block';
      });

      popupOv.addEventListener('click', (e) => {
          // Si se hace clic directamente en el overlay (el área transparente alrededor del menu)
          if (e.target === popupOv) {
              popupOv.style.display = 'none';
          }
      });

      function syncThemeToIframes() {
        const isDark = document.documentElement.classList.contains('isDarkmodeActive');
        document.querySelectorAll('iframe').forEach(ifr => {
          try {
            if (ifr.contentDocument && ifr.contentDocument.documentElement) {
              ifr.contentDocument.documentElement.classList.toggle('isDarkmodeActive', isDark);
              ifr.contentDocument.documentElement.setAttribute('data-dme-dark-mode', isDark ? 'on' : 'off');
            }
          } catch (e) { /* ignore cross-origin */ }
        });
      }

      window.addEventListener('message', (e) => {
        if (e.data.type === 'set-theme') {
            const theme = e.data.theme;
            document.documentElement.setAttribute('data-dme-dark-mode', theme);
            if (theme === 'on') {
                document.documentElement.classList.add('isDarkmodeActive');
            } else if (theme === 'off') {
                document.documentElement.classList.remove('isDarkmodeActive');
            } else if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.classList.toggle('isDarkmodeActive', prefersDark);
            }
            syncThemeToIframes();
        }
        if (e.data === 'close-user-menu') {
            popupOv.style.display = 'none';
        }
      });

      // Sync theme when any iframe finishes loading
      document.addEventListener('load', (e) => {
        if (e.target.tagName === 'IFRAME') syncThemeToIframes();
      }, true);
    }
  });
  </script>
