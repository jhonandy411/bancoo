    <script>
        (function() {
            const iframe = document.getElementById('analysis-frame');
            if (!iframe) return;
            
            function resizeIframe() {
                try {
                    if (iframe.contentWindow && iframe.contentWindow.document.body) {
                        // Force the iframe document to have auto height
                        iframe.contentWindow.document.body.style.height = 'auto';
                        iframe.contentWindow.document.documentElement.style.height = 'auto';
                        
                        const height = iframe.contentWindow.document.documentElement.scrollHeight;
                        if (height > 0) {
                            iframe.style.height = height + 'px';
                        }
                    }
                } catch (e) {
                    console.log('Resize error:', e);
                }
            }

            // Cleanup previous execution resources if they exist in the global scope
            if (window._analysisCleanup) {
                window._analysisCleanup();
            }

            // Define robust resize on events
            const handleLoad = function() {
                resizeIframe();
                try {
                    const observer = new iframe.contentWindow.MutationObserver(resizeIframe);
                    observer.observe(iframe.contentWindow.document.body, { childList: true, subtree: true, attributes: true });
                } catch(e) {}
            };

            iframe.addEventListener('load', handleLoad);
            window.addEventListener('resize', resizeIframe);
            
            // Tab switching logic
            const tabs = document.querySelectorAll('[role="tab"]');
            const tabHandlers = [];
            
            tabs.forEach(tab => {
                const handler = function(e) {
                    tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
                    tab.setAttribute('aria-selected', 'true');

                    if (window.parent && window.parent.resetSidebar && window.parent.minimizeSidebar) {
                        const tabId = tab.id;
                        if (tabId === 'tab-0' || tabId === 'tab-1') {
                            window.parent.resetSidebar();
                        } else if (tabId === 'tab-2') {
                            window.parent.minimizeSidebar('sidebartoc3.html');
                        }
                    }

                    // Reset height so it can grow/shrink accurately with new content
                    iframe.style.height = '90px';
                    setTimeout(resizeIframe, 150);
                    setTimeout(resizeIframe, 500);
                };
                tab.addEventListener('click', handler);
                tabHandlers.push({ tab, handler });
            });

            // Periodic check
            const intervalId = setInterval(() => {
                if (!document.body.contains(iframe)) {
                    if (window._analysisCleanup) window._analysisCleanup();
                    return;
                }
                resizeIframe();
            }, 1000);

            // Export cleanup function to global scope to be called by subsequent loads
            window._analysisCleanup = function() {
                iframe.removeEventListener('load', handleLoad);
                window.removeEventListener('resize', resizeIframe);
                tabHandlers.forEach(({ tab, handler }) => tab.removeEventListener('click', handler));
                clearInterval(intervalId);
                window._analysisCleanup = null;
            };
        })();
    </script>
